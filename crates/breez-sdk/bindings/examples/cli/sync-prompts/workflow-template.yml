# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/{{LANG_ID}}.toml
name: {{WORKFLOW_NAME}}

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: 'Optional base commit SHA to diff against (leave empty for full comparison)'
        required: false
        type: string
      dry-run:
        description: 'Run the sync without creating a PR (test mode)'
        required: false
        type: boolean
        default: false
      approve-run:
        description: 'Run ID of a previous dry-run to approve (applies cached diff and creates PR)'
        required: false
        type: string
  workflow_run:
    workflows: ["Sync CLI Languages"]
    types: [completed]

concurrency:
  group: {{CONCURRENCY_GROUP}}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  {{JOB_NAME}}:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Validate inputs
        if: inputs.dry-run && inputs.approve-run != ''
        run: |
          echo "::error::Cannot use dry-run and approve-run together."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Approve flow ────────────────────────────────────────────────
      - name: Download dry-run patch
        if: inputs.approve-run != ''
        uses: actions/download-artifact@v4
        with:
          name: sync-{{LANG_ID}}-patch
          run-id: ${{ inputs.approve-run }}
          github-token: ${{ github.token }}

      - name: Apply patch and create PR
        if: inputs.approve-run != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s sync-{{LANG_ID}}.patch ]; then
            echo "::notice::Patch is empty — no changes to apply."
            exit 0
          fi
          if ! git apply sync-{{LANG_ID}}.patch; then
            echo "::error::Patch failed to apply — the target files may have changed since the dry-run. Run a new dry-run instead."
            exit 1
          fi
          {{BUILD_CHECK}}
          BRANCH="claude/sync-{{LANG_ID}}-cli-$(echo "${{ github.sha }}" | cut -c1-7)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add {{TARGET_DIR}}
          git commit -m "chore: sync {{LANG_NAME}} CLI with Rust CLI changes (${{ github.sha }})"
          git push --force-with-lease -u origin HEAD
          gh pr create --title "chore: sync {{LANG_NAME}} CLI with Rust CLI changes" \
            --body "Automated sync of {{LANG_NAME}} CLI from Rust CLI changes in ${{ github.sha }}. Approved from dry-run https://github.com/${{ github.repository }}/actions/runs/${{ inputs.approve-run }}" \
            --base main

      # ── Normal / dry-run flow ───────────────────────────────────────
      - name: Compute diff info
        if: inputs.approve-run == ''
        id: diff-info
        run: |
          DIFF_BASE="${{ inputs.base-sha }}"
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
              echo "::error::Provided base-sha ($DIFF_BASE) not found in repository."
              exit 1
            fi
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "Rust CLI changes since $DIFF_BASE:"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "No base SHA provided — perform a full comparison of the Rust CLI against the {{LANG_NAME}} CLI."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: {{STEP_NAME}}
        if: inputs.approve-run == ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --allowed-tools
            {{ALLOWED_TOOLS}}
          prompt: |
{{PROMPT}}

      - name: Create dry-run patch
        if: inputs.approve-run == '' && inputs.dry-run
        run: git diff HEAD -- '{{TARGET_DIR}}' > sync-{{LANG_ID}}.patch

      - name: Upload dry-run patch
        if: inputs.approve-run == '' && inputs.dry-run
        uses: actions/upload-artifact@v4
        with:
          name: sync-{{LANG_ID}}-patch
          path: sync-{{LANG_ID}}.patch
          retention-days: 7

      - name: Upload Claude log
        if: always() && inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-{{LANG_ID}}-claude-log
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 7
          if-no-files-found: ignore

      # ── Summary ─────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.approve-run }}" != "" ]; then
            if [ -s sync-{{LANG_ID}}.patch ]; then
              echo "::notice::PR created from approved dry-run ${{ inputs.approve-run }}"
            else
              echo "::notice::Patch from dry-run ${{ inputs.approve-run }} was empty — no changes needed."
            fi
          elif [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — {{LANG_NAME}} CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if [ -s sync-{{LANG_ID}}.patch ]; then
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              cat sync-{{LANG_ID}}.patch >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "To approve, re-run this workflow with \`approve-run\` set to \`${{ github.run_id }}\`." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No {{LANG_NAME}} CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "::notice::Dry run completed — no PR created. See job summary for diff."
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
