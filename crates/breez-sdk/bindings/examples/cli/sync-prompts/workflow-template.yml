# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/{{LANG_ID}}.toml
name: {{WORKFLOW_NAME}}

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: 'Base commit SHA to diff against (leave empty to auto-detect from last sync commit)'
        required: false
        type: string
      dry-run:
        description: 'Run the sync without creating a PR (test mode)'
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: ["Sync CLI Languages"]
    types: [completed]

concurrency:
  group: {{CONCURRENCY_GROUP}}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  {{JOB_NAME}}:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff info
        id: diff-info
        run: |
          # Determine diff base. Priority:
          # 1. Explicit base-sha from workflow_dispatch input
          # 2. Auto-detect: last commit that touched this language CLI (= last sync point)
          DIFF_BASE="${{ inputs.base-sha }}"
          if [ -z "$DIFF_BASE" ] || [ "$DIFF_BASE" = "0000000000000000000000000000000000000000" ]; then
            DIFF_BASE=$(git log -1 --format=%H -- '{{TARGET_DIR}}')
            if [ -n "$DIFF_BASE" ]; then
              echo "Auto-detected diff base from last sync commit: $DIFF_BASE"
            fi
          fi

          if [ -n "$DIFF_BASE" ]; then
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
            if [ -z "$DIFF_STAT" ]; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No Rust CLI changes since last sync — nothing to do."
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            fi
          else
            # No language CLI commits yet — first sync
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "First sync — no previous language CLI commits found. Do a full comparison."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: {{STEP_NAME}}
        if: steps.diff-info.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            {{ALLOWED_TOOLS}}
          prompt: |
{{PROMPT}}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff-info.outputs.has_changes }}" != "true" ]; then
            echo "::notice::No Rust CLI changes to sync — {{LANG_NAME}} CLI is up to date."
          elif [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — {{LANG_NAME}} CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if git diff --quiet HEAD -- '{{TARGET_DIR}}'; then
              echo "No {{LANG_NAME}} CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
              echo "::notice::Dry run completed — no changes needed."
            else
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              git diff HEAD -- '{{TARGET_DIR}}' >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "::notice::Dry run completed — no PR created. See job summary for diff."
            fi
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
