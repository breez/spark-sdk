# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/{{LANG_ID}}.toml
name: {{WORKFLOW_NAME}}

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      diff_summary:
        description: 'Summary of Rust CLI changes (from umbrella workflow)'
        required: false
        type: string

concurrency:
  group: {{CONCURRENCY_GROUP}}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  {{JOB_NAME}}:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine diff summary
        id: diff-info
        run: |
          if [ -n "${{ inputs.diff_summary }}" ]; then
            # Called from umbrella workflow — use provided summary
            {
              echo "diff_summary<<EODIFF"
              echo "${{ inputs.diff_summary }}"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — always run, generate diff from HEAD~1
            echo "Manual trigger — running sync"
            {
              echo "diff_summary<<EODIFF"
              git diff --stat HEAD~1 HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md' || echo "Manual trigger (workflow_dispatch)"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No diff summary provided and not a manual trigger"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: {{STEP_NAME}}
        if: steps.diff-info.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            {{ALLOWED_TOOLS}}
          prompt: |
{{PROMPT}}

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff-info.outputs.has_changes }}" != "true" ]; then
            echo "::notice::No changes to sync — skipping"
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
