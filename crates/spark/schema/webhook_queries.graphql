mutation RegisterWalletWebhook($input: RegisterSparkWalletWebhookInput!) {
  register_wallet_webhook(input: $input) {
    webhook_id
  }
}

mutation DeleteWalletWebhook($input: DeleteSparkWalletWebhookInput!) {
  delete_wallet_webhook(input: $input) {
    success
  }
}

query WalletWebhooks {
  wallet_webhooks {
    webhooks {
      webhook_id
      url
      event_types
    }
  }
}
