name: Docs

on:
  workflow_call:

jobs:
  check-snippets:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Rust is the source of truth, kept on top.
          - platform: rust
            runner: ubuntu-latest
          # Other bindings alphabetically.
          - platform: csharp
            runner: ubuntu-latest
            dotnet-version: "8.0.x"
          - platform: flutter
            runner: ubuntu-latest
            flutter: true
          - platform: golang
            runner: ubuntu-latest
          - platform: kotlin-multiplatform
            runner: ubuntu-latest
            java-version: "17"
            gradle: true
          - platform: python
            runner: ubuntu-latest
            python-version: "3.12"
          - platform: react-native
            runner: macos-latest
            node-version: "22"
            ios-targets: true
          - platform: swift
            runner: macos-latest
          - platform: wasm
            runner: ubuntu-latest
            node-version: "22"
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: matrix.node-version
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Flutter
        if: matrix.flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.3

      - name: Setup just
        if: matrix.flutter
        uses: extractions/setup-just@v3

      - name: Setup Python
        if: matrix.python-version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup Java
        if: matrix.java-version
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: ${{ matrix.java-version }}

      - name: Setup Gradle
        if: matrix.gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache gobley-uniffi-bindgen
        if: matrix.gradle
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/gobley-uniffi-bindgen
          # Bump the suffix when the gobley pin in
          # crates/breez-sdk/bindings/Makefile changes.
          key: gobley-uniffi-bindgen-v0.3.7-with-fixes-${{ runner.os }}

      - name: Install Rust targets (iOS)
        if: matrix.ios-targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - name: Setup .NET
        if: matrix.dotnet-version
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Check doc snippets
        run: cargo xtask check-doc-snippets -p ${{ matrix.platform }}
