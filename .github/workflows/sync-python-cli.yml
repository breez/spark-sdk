# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/python.toml
name: Sync Python CLI from Rust CLI

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: 'Base commit SHA to diff against (leave empty to auto-detect from last sync commit)'
        required: false
        type: string
      dry-run:
        description: 'Run the sync without creating a PR (test mode)'
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: ["Sync CLI Languages"]
    types: [completed]

concurrency:
  group: sync-python-cli-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-python-cli:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff info
        id: diff-info
        run: |
          # Determine diff base. Priority:
          # 1. Explicit base-sha from workflow_dispatch input
          # 2. Auto-detect: last commit that touched this language CLI (= last sync point)
          DIFF_BASE="${{ inputs.base-sha }}"
          if [ -z "$DIFF_BASE" ] || [ "$DIFF_BASE" = "0000000000000000000000000000000000000000" ]; then
            DIFF_BASE=$(git log -1 --format=%H -- 'crates/breez-sdk/bindings/examples/cli/langs/python/')
            if [ -n "$DIFF_BASE" ]; then
              echo "Auto-detected diff base from last sync commit: $DIFF_BASE"
            fi
          fi

          if [ -n "$DIFF_BASE" ]; then
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
            if [ -z "$DIFF_STAT" ]; then
              echo "has_changes=false" >> "$GITHUB_OUTPUT"
              echo "No Rust CLI changes since last sync — nothing to do."
            else
              echo "has_changes=true" >> "$GITHUB_OUTPUT"
            fi
          else
            # No language CLI commits yet — first sync
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "First sync — no previous language CLI commits found. Do a full comparison."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Python CLI
        if: steps.diff-info.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            Read,Write,Edit,Glob,Grep,
            Bash(git diff:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git log:*),Bash(git status:*),
            Bash(gh pr create:*),Bash(gh pr list:*),
            Bash(make -C crates/breez-sdk/bindings/examples/cli check-python:*)
          prompt: |
            ## Task: Sync Python CLI with Rust CLI changes

            Your job is to update the Python CLI to match the current Rust CLI.

            ### What changed
            ${{ steps.diff-info.outputs.diff_summary }}

            ### Step 1: Analyze the changes
            If a diff base was provided, run: `git diff ${{ steps.diff-info.outputs.diff_base }} HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md'`
            Otherwise (manual trigger without a base SHA), read the full Rust CLI source files and compare them against the current Python CLI to identify all differences.
            Always read the current Rust files for full context.

            ### Step 2: File mapping


            | Rust source | Python target |
            |-------------|---------------|
            | `crates/breez-sdk/cli/src/main.rs` | `crates/breez-sdk/bindings/examples/cli/langs/python/src/breez_cli/main.py` |
            | `crates/breez-sdk/cli/src/command/mod.rs` | `crates/breez-sdk/bindings/examples/cli/langs/python/src/breez_cli/commands.py` |
            | `crates/breez-sdk/cli/src/command/issuer.rs` | `crates/breez-sdk/bindings/examples/cli/langs/python/src/breez_cli/issuer.py` |
            | `crates/breez-sdk/cli/src/persist.rs` | `crates/breez-sdk/bindings/examples/cli/langs/python/src/breez_cli/persistence.py` |
            | `crates/breez-sdk/cli/README.md` | `crates/breez-sdk/bindings/examples/cli/langs/python/README.md` |

            `serialization.py` is Python-only (Rust uses serde). Don't touch it unless adding a new serialization helper.

            **New command subgroup files** (like `contacts.rs`): If the Rust CLI adds a new `command/<name>.rs` subgroup (similar to `issuer.rs`), create a matching Python file at `crates/breez-sdk/bindings/examples/cli/langs/python/src/breez_cli/<name>.py` following the same pattern as `issuer.py`: a dispatch function, a command registry, parser builders, and handler functions.

            **Platform-specific Rust modules** (like `seedless_restore/`): Some Rust CLI directories contain platform-specific utilities (passkey/FIDO2/YubiKey). If these add new CLI flags or options to `main.rs`, implement the Python equivalent where feasible. If a feature depends on Rust-only crates with no Python equivalent, add the CLI flags but 'print a "not yet supported" message in the handler'. Always check if the README was also updated and sync documentation accordingly.

            ### Step 3: Translation rules


            **Commands:**
            - Rust `Command` enum PascalCase → Python kebab-case names
            - New commands need: `_build_<cmd>_parser()`, `_handle_<cmd>()`, registry entry, `COMMAND_NAMES` entry

            **Arguments:**
            - `#[arg(short = 'x', long)]` → `p.add_argument("-x", "--long-name", ...)`
            - `Option<T>` → `default=None`
            - `#[arg(action = clap::ArgAction::SetTrue)]` → `action="store_true", default=False`
            - `Vec<T>` → `nargs="*", default=None`

            **SDK calls:**
            - `sdk.method(Request { field1, field2 })` → `await sdk.method(request=Request(field1=val, field2=val))`

            **Enums:**
            - `EnumType::Variant { field }` → `EnumType.VARIANT(field=field)`
            - `EnumType::Variant` (unit) → `EnumType.VARIANT` (no parens)

            **Interactive prompts:**
            - `rl.readline(prompt)` → `await session.prompt_async(prompt)`

            **Output:**
            - `print_value(&v)?` → `print_value(v)`

            **Errors:**
            - `return Err(anyhow!("msg"))` → `print("msg"); return`

            **Subcommand groups (like Issuer, Contacts):**
            - Rust `Command::GroupName(SubCommand)` dispatches to `group::handle_command()`
            - Python: main REPL checks `cmd_name == "group"` and calls `dispatch_group_command(args, ...)`
            - Each group has its own file with `COMMAND_NAMES`, `build_registry()`, parser builders, handlers

            **Python-specific UniFFI quirks:**
            - Python UniFFI enum variant names use SCREAMING_SNAKE_CASE (e.g., `InputType.LNURL_PAY`).
            - Python UniFFI enum variant fields use snake_case (e.g., `input_type.data`).


            ### Step 3b: Documentation sync rules

            When `crates/breez-sdk/cli/README.md` changes, update the Python CLI README at
            `crates/breez-sdk/bindings/examples/cli/langs/python/README.md` to reflect the same
            features and configuration options, but with Python-specific syntax and usage:

            - **New features/sections**: If the Rust README adds documentation for a new feature
              (e.g., seedless restore, new CLI flags), add an equivalent section to the Python README
              with Python-specific installation steps, commands (`breez-cli` instead of `cargo run --`), and Python-specific configuration.
            - **CLI option changes**: If new `--flags` are documented, translate `cargo run -- --flag`
              to `breez-cli --flag` and update the CLI Options table.
            - **Rust-only features**: If a feature is Rust-only (e.g., requires `--features fido2`
              cargo flag, uses YubiKey OTP crates), document it as "Not yet available in Python CLI"
              or skip it if it has no Python equivalent at all.
            - **Do NOT copy verbatim**: Rewrite documentation in the style of the existing Python
              README. Keep the existing structure (Prerequisites, Quick Start, Makefile Targets,
              CLI Options, Environment Variables, Available Commands, Development).
            - **Preserve existing Python-specific content**: Don't remove the Makefile targets,
              venv instructions, or pip install sections — those are Python-only.

            ### Step 4: Scope constraint
            ONLY modify files under: `crates/breez-sdk/bindings/examples/cli/langs/python/`
            Do NOT modify any other files.

            ### Step 5: Build check
            After making changes, verify the code is syntactically valid:
            ```bash
            make -C crates/breez-sdk/bindings/examples/cli check-python
            ```
            If any check fails, fix the errors before proceeding.

            ### Step 6: Verify and create PR
            After making changes:
            1. Read back each modified file to verify correctness
            2. **If this is a dry run** (`${{ inputs.dry-run }}` is `true`): do NOT create a branch or PR. Leave the changes in the working tree and stop here.
            3. **Otherwise**, create a branch and PR:
            ```bash
            git checkout -b claude/sync-python-cli-$(echo "${{ github.sha }}" | cut -c1-7)
            git add crates/breez-sdk/bindings/examples/cli/langs/python/
            git commit -m "chore: sync Python CLI with Rust CLI changes (${{ github.sha }})"
            git push -u origin HEAD
            gh pr create --title "chore: sync Python CLI with Rust CLI changes" \
              --body "Automated sync of Python CLI from Rust CLI changes in ${{ github.sha }}" \
              --base main
            ```

            ### Step 7: No-op check
            If the Rust changes don't affect CLI commands or documentation (e.g., only Cargo.toml changes or internal-only refactoring with no user-facing impact), do NOT create a PR. Output: "No Python CLI changes needed."

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff-info.outputs.has_changes }}" != "true" ]; then
            echo "::notice::No Rust CLI changes to sync — Python CLI is up to date."
          elif [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — Python CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if git diff --quiet HEAD -- 'crates/breez-sdk/bindings/examples/cli/langs/python/'; then
              echo "No Python CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
              echo "::notice::Dry run completed — no changes needed."
            else
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              git diff HEAD -- 'crates/breez-sdk/bindings/examples/cli/langs/python/' >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "::notice::Dry run completed — no PR created. See job summary for diff."
            fi
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
