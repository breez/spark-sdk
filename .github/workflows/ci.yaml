name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
        triggered_by:
          description: Who triggered this run
          required: false
          default: manual

run-name: ${{ inputs.triggered_by != '' && format('CI triggered by {0}', inputs.triggered_by) || github.event.head_commit.message || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Clippy
        run: make cargo-clippy-check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Format Check
        run: make fmt-check

  passkey-core-sync:
    name: Passkey core sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify CredentialManagerPrfCore copies are in sync
        run: cargo xtask sync-passkey-core --check

  rn-post-ubrn-check:
    name: RN post-ubrn sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify post-ubrn patches are in sync
        working-directory: packages/react-native
        run: node ./scripts/post-ubrn.js --check

  itest:
    name: Integration test (${{ matrix.backend.name }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.backend.allow-failure }}
    strategy:
      fail-fast: false
      matrix:
        backend:
          - { name: in-memory, target: itest,             allow-failure: false }
          - { name: postgres,  target: spark-itest-pg,    allow-failure: true }
          - { name: mysql,     target: spark-itest-mysql, allow-failure: true }
    env:
      FAUCET_USERNAME: ${{ secrets.FAUCET_USERNAME }}
      FAUCET_PASSWORD: ${{ secrets.FAUCET_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: make ${{ matrix.backend.target }}

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: make cargo-test

      - name: Check git status
        uses: ./.github/actions/check-git-status
  
  breez-test:
    name: Breez integration tests
    runs-on: ubuntu-latest
    env:
      FAUCET_USERNAME: ${{ secrets.FAUCET_USERNAME }}
      FAUCET_PASSWORD: ${{ secrets.FAUCET_PASSWORD }}
      FAUCET_CONCURRENCY: "2"  # Max concurrent faucet requests (rate limiting)
      RECOVERY_TEST_MNEMONIC: ${{ secrets.RECOVERY_TEST_MNEMONIC_V2 }}
      RECOVERY_TEST_EXPECTED_PAYMENTS: ${{ secrets.RECOVERY_TEST_EXPECTED_PAYMENTS_V2 }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests (DIAG loop lnurl send-all)
        env:
          RUST_LOG: "warn,spark_wallet=info,spark::tree::store=info,spark::tree::leaf_optimizer=info,spark::services::swap=info,spark::tree::service=info,lnurl=info,breez_sdk_itest=info,breez_sdk_spark=info"
        run: |
          for i in $(seq 1 12); do
            echo "::group::DIAG lnurl iteration $i"
            cargo test -p breez-sdk-itest --test lnurl -- --test-threads=8 --nocapture
            echo "::endgroup::"
          done

  wasm-clippy:
    name: Wasm clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Clippy
        run: make wasm-clippy-check

  wasm-test:
    name: Wasm test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Tests
        run: make wasm-test

      - name: Check git status
        uses: ./.github/actions/check-git-status

  flutter:
    name: Flutter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.3
      - run: flutter --version

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Initialize the workspace
        working-directory: packages/flutter
        run: just setup

      - name: Generate Dart/Flutter bindings & Check Rust package for errors
        working-directory: packages/flutter
        run: |
          just codegen
          cd rust && cargo check

      - name: Static Analysis
        working-directory: packages/flutter
        if: ${{ success() || failure() }}
        run: dart analyze --no-fatal-warnings lib

      - name: Check Formatting
        working-directory: packages/flutter
        run: dart format -o none --set-exit-if-changed -l 110 lib

      # This step is added to ensure version recipe was run to update podspec files & Gradle script.
      # It does not catch the case where 'packages/flutter/pubspec.yaml' wasn't updated properly.
      - name: Update version number on podspec files & Gradle scripts
        working-directory: packages/flutter
        run: just version

      - name: Check git status
        uses: ./.github/actions/check-git-status

      - name: CLI static analysis (flutter)
        working-directory: crates/breez-sdk/bindings/examples/cli
        run: make check-flutter

  cli:
    name: CLI
    uses: ./.github/workflows/cli-ci.yml
    secrets: inherit

  docs:
    name: Docs
    uses: ./.github/workflows/docs-ci.yml
    secrets: inherit
