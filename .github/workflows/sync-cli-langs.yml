name: Sync CLI Languages

on:
  push:
    branches: [main]
    paths:
      - 'crates/breez-sdk/cli/src/**'
      - 'crates/breez-sdk/cli/README.md'
  workflow_dispatch:
    inputs:
      languages-to-sync:
        description: 'Array of languages to sync (remove what you do not want)'
        required: true
        type: string
        default: '["python", "go"]'

concurrency:
  group: sync-cli-langs-${{ github.sha }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      diff_summary: ${{ steps.diff.outputs.diff_summary }}
      python: ${{ contains(fromJSON(inputs.languages-to-sync || '["python", "go"]'), 'python') }}
      go: ${{ contains(fromJSON(inputs.languages-to-sync || '["python", "go"]'), 'go') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Compute diff summary
        id: diff
        run: |
          {
            echo "diff_summary<<EODIFF"
            git diff --stat HEAD~1 HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md' || echo "Manual trigger"
            echo "EODIFF"
          } >> "$GITHUB_OUTPUT"

  sync-python:
    name: Sync Python CLI
    needs: setup
    if: needs.setup.outputs.python == 'true'
    uses: ./.github/workflows/sync-python-cli.yml
    with:
      diff_summary: ${{ needs.setup.outputs.diff_summary }}
    secrets: inherit

  sync-go:
    name: Sync Go CLI
    needs: setup
    if: needs.setup.outputs.go == 'true'
    uses: ./.github/workflows/sync-go-cli.yml
    with:
      diff_summary: ${{ needs.setup.outputs.diff_summary }}
    secrets: inherit

  summary:
    name: Sync Summary
    needs: [setup, sync-python, sync-go]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Report results
        run: |
          echo "## CLI Sync Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Language | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python | ${{ needs.sync-python.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Go | ${{ needs.sync-go.result || 'skipped' }} |" >> "$GITHUB_STEP_SUMMARY"
