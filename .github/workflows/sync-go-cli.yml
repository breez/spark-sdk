# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/go.toml
name: Sync Go CLI from Rust CLI

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: 'Optional base commit SHA to diff against (leave empty for full comparison)'
        required: false
        type: string
      dry-run:
        description: 'Run the sync without creating a PR (test mode)'
        required: false
        type: boolean
        default: false
      approve-run:
        description: 'Run ID of a previous dry-run to approve (applies cached diff and creates PR)'
        required: false
        type: string
  workflow_run:
    workflows: ["Sync CLI Languages"]
    types: [completed]

concurrency:
  group: sync-go-cli-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-go-cli:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Validate inputs
        if: inputs.dry-run && inputs.approve-run != ''
        run: |
          echo "::error::Cannot use dry-run and approve-run together."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Approve flow ────────────────────────────────────────────────
      - name: Download dry-run patch
        if: inputs.approve-run != ''
        uses: actions/download-artifact@v4
        with:
          name: sync-go-patch
          run-id: ${{ inputs.approve-run }}
          github-token: ${{ github.token }}

      - name: Apply patch and create PR
        if: inputs.approve-run != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s sync-go.patch ]; then
            echo "::notice::Patch is empty — no changes to apply."
            exit 0
          fi
          if ! git apply sync-go.patch; then
            echo "::error::Patch failed to apply — the target files may have changed since the dry-run. Run a new dry-run instead."
            exit 1
          fi
          make -C crates/breez-sdk/bindings/examples/cli check-go
          BRANCH="claude/sync-go-cli-$(echo "${{ github.sha }}" | cut -c1-7)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add crates/breez-sdk/bindings/examples/cli/langs/go/
          git commit -m "chore: sync Go CLI with Rust CLI changes (${{ github.sha }})"
          git push --force-with-lease -u origin HEAD
          gh pr create --title "chore: sync Go CLI with Rust CLI changes" \
            --body "Automated sync of Go CLI from Rust CLI changes in ${{ github.sha }}. Approved from dry-run https://github.com/${{ github.repository }}/actions/runs/${{ inputs.approve-run }}" \
            --base main

      - name: Cleanup branch on approve failure
        if: failure() && inputs.approve-run != ''
        run: |
          BRANCH="claude/sync-go-cli-$(echo "${{ github.sha }}" | cut -c1-7)"
          git push origin --delete "$BRANCH" 2>/dev/null || true

      # ── Normal / dry-run flow ───────────────────────────────────────
      - name: Compute diff info
        if: inputs.approve-run == ''
        id: diff-info
        run: |
          DIFF_BASE="${{ inputs.base-sha }}"
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
              echo "::error::Provided base-sha ($DIFF_BASE) not found in repository."
              exit 1
            fi
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "Rust CLI changes since $DIFF_BASE:"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "No base SHA provided — perform a full comparison of the Rust CLI against the Go CLI."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Go CLI
        if: inputs.approve-run == ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --model claude-opus-4-6
            --allowed-tools
            Read,Write,Edit,Glob,Grep,
            Bash(git diff:*),Bash(git checkout -b claude/sync-:*),Bash(git add crates/breez-sdk/bindings/examples/cli/langs/go/:*),Bash(git commit -m:*),Bash(git push -u origin HEAD:*),
            Bash(gh pr create --title:*),
            Bash(make -C crates/breez-sdk/bindings/examples/cli check-go:*)
          prompt: |
            ## Task: Sync Go CLI with Rust CLI changes

            Your job is to update the Go CLI to match the current Rust CLI.

            ### What changed
            ${{ steps.diff-info.outputs.diff_summary }}

            ### Step 1: Analyze the changes
            If a diff base was provided, run: `git diff ${{ steps.diff-info.outputs.diff_base }} HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md'`
            The diff is a hint for what changed recently, but it may not reveal all differences.

            **Always read the current Rust CLI source files and compare them against the Go CLI.** The Rust CLI is the source of truth. Read each mapped file pair (see Step 2) and perform this comparison for each pair:

            #### 1a. Extract SDK calls
            For each file pair, list every SDK/builder method call in both versions:
            - Rust: every call on `sdk`, `sdk_builder`, `config`, or any SDK type
            - Go: every corresponding call on `sdk`, `builder`, `config`, or any SDK type

            #### 1b. Compare call-by-call
            For each SDK call in the Rust file, find the corresponding call in the Go file. Flag any of these as a **divergence**:
            - Different function name (e.g., `with_postgres_storage()` vs `create_postgres_storage()`)
            - Different arguments or parameters
            - Extra steps in one version that don't exist in the other (e.g., two-step init vs one-step)
            - Missing calls — an SDK call in Rust with no equivalent in Go

            #### 1c. Compare CLI flags and commands
            - List every CLI flag/option in both versions and flag any missing or mismatched ones
            - List every command/subcommand and flag any missing ones

            #### 1d. Verify against snippets
            For every divergence found, check the Go SDK snippets at `docs/breez-sdk/snippets/` to determine the correct API. The snippets are always up-to-date — if the Rust CLI uses a function, assume it exists in the Go SDK unless the snippets prove otherwise.

            **Do NOT assume SDK API differences are "binding-level" or "expected."** If the Rust CLI calls `with_postgres_storage()` and the Go CLI calls `create_postgres_storage() + with_storage()`, that is a divergence — check the snippets and fix it.

            Only after completing 1a–1d should you decide which divergences to fix. Implement what's feasible — if a feature can't be ported (missing bindings, no equivalent package, platform limitation), add the CLI flag but 'use `handleNotYetSupported` as the handler' and leave a comment explaining why.


            ### Step 2: File mapping


            | Rust source | Go target |
            |-------------|-----------|
            | `crates/breez-sdk/cli/src/main.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/main.go` |
            | `crates/breez-sdk/cli/src/command/mod.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/commands.go` |
            | `crates/breez-sdk/cli/src/command/issuer.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/issuer.go` |
            | `crates/breez-sdk/cli/src/persist.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/persistence.go` |
            | `crates/breez-sdk/cli/README.md` | `crates/breez-sdk/bindings/examples/cli/langs/go/README.md` |

            `serialization.go` is Go-only (Rust uses serde). Don't touch it unless adding a new serialization helper.

            **New command subgroup files** (like `contacts.rs`): If the Rust CLI adds a new `command/<name>.rs` subgroup (similar to `issuer.rs`), create a matching Go file at `crates/breez-sdk/bindings/examples/cli/langs/go/<name>.go` following the same pattern as `issuer.go`: a dispatch function, a command registry, and handler functions.

            **Platform-specific Rust modules** (like `seedless_restore/`): Some Rust CLI directories contain platform-specific utilities (passkey/FIDO2/YubiKey). If these add new CLI flags or options to `main.rs`, implement the Go equivalent where feasible. If a feature depends on Rust-only crates with no Go equivalent, add the CLI flags but 'use `handleNotYetSupported` as the handler'. Always check if the README was also updated and sync documentation accordingly.

            ### Step 3: Translation rules


            **Commands:**
            - Rust `Command` enum PascalCase → Go kebab-case command names in registry
            - New commands need: `handleXxx` function, `BuildCommandRegistry()` entry, `CommandNames` entry

            **Arguments:**
            - `#[arg(short = 'x', long)]` → `fs.String("x", default, desc)` + `fs.StringVar(&v, "long-name", default, desc)`
            - `Option<T>` → pointer type (`*string`, `*uint64`)
            - `Vec<T>` → `stringSliceFlag` custom type (implements `flag.Value`)
            - `#[arg(action = clap::ArgAction::SetTrue)]` → `fs.Bool("name", false, desc)`

            **SDK calls:**
            - `sdk.method(Request { field1, field2 })` → `sdk.Method(breez_sdk_spark.MethodRequest{Field1: val, Field2: val})`
            - Return types: `result, err := sdk.Method(req)` with `if err != nil { return err }`

            **Enums:**
            - `EnumType::Variant { field }` → `breez_sdk_spark.EnumTypeVariant{Field: field}`
            - `EnumType::Variant` (unit) → `breez_sdk_spark.EnumTypeVariant{}`
            - Pattern match → `switch v := val.(type) { case breez_sdk_spark.EnumTypeVariant: ... }`

            **Interactive prompts:**
            - `rl.readline(prompt)` → `readlinePrompt(rl, prompt)` or `readlineWithDefault(rl, prompt, default)`

            **Output:**
            - `print_value(&v)?` → `printValue(v)`

            **Errors:**
            - `return Err(anyhow!("msg"))` → `return fmt.Errorf("msg")`

            **SDK version:**
            The Go CLI uses the published Go SDK. You can check available SDK methods by reading the Go source in the module cache (e.g. `go/pkg/mod/github.com/breez/breez-sdk-spark-go@*/breez_sdk_spark/breez_sdk_spark.go`). All commands should be fully implemented — do not use stub handlers.

            **Subcommand groups (like Issuer, Contacts):**
            - Rust `Command::GroupName(SubCommand)` dispatches to `group::handle_command()`
            - Go: main REPL checks `cmdName == "group"` and calls `DispatchGroupCommand(args, rl)`
            - Each group has its own file with `CommandNames`, `BuildRegistry()`, dispatch function, handlers

            **Go-specific UniFFI quirks:**
            - Go UniFFI enum variants use `Field0` for unnamed fields (e.g., `InputTypeLnurlPay.Field0` not `.Data`)
            - `u128` type alias is `*big.Int` — so `Amount u128` means `Amount *big.Int`, and `Amount *u128` means `Amount **big.Int`
            - Go UniFFI bindings return `*SdkError` which is a typed nil on success. Use `liftError(err)` to convert to untyped nil before `err != nil` checks.


            ### Step 3b: Documentation sync rules

            When `crates/breez-sdk/cli/README.md` changes, update the Go CLI README at
            `crates/breez-sdk/bindings/examples/cli/langs/go/README.md` to reflect the same
            features and configuration options, but with Go-specific syntax and usage:

            - **New features/sections**: If the Rust README adds documentation for a new feature
              (e.g., seedless restore, new CLI flags), add an equivalent section to the Go README
              with Go-specific build and run commands (`make run` instead of `cargo run --`).
            - **CLI option changes**: If new `--flags` are documented, translate `cargo run -- --flag`
              to `./breez-cli --flag` and update the CLI Options table.
            - **Rust-only features**: If a feature is Rust-only (e.g., requires `--features fido2`
              cargo flag, uses YubiKey OTP crates), document it as "Not yet available in Go CLI"
              or skip it if it has no Go equivalent at all.
            - **Do NOT copy verbatim**: Rewrite documentation in the style of the existing Go
              README. Keep the existing structure (Prerequisites, Quick Start, Makefile Targets,
              CLI Options, Environment Variables, Available Commands, Development).
            - **Preserve existing Go-specific content**: Don't remove the Makefile targets,
              go build instructions, or Go-specific notes.

            ### Step 4: Write findings summary
            After comparing all file pairs, write a short summary to `sync-findings.md` with:
            - **Differences found**: list each divergence (1 line each)
            - **Changes applied**: which differences you fixed
            - **Skipped**: which differences you could not fix and why (missing bindings, platform limitation, etc.)
            - If no differences were found, write "No differences found — CLIs are in sync."

            ### Step 5: Scope constraint
            ONLY modify files under: `crates/breez-sdk/bindings/examples/cli/langs/go/`
            Do NOT modify any other files.

            ### Step 6: Build check
            After making changes, verify the code is syntactically valid:
            ```bash
            make -C crates/breez-sdk/bindings/examples/cli check-go
            ```
            If any check fails, fix the errors before proceeding.

            ### Step 7: Verify and create PR
            After making changes:
            1. Read back each modified file to verify correctness
            2. **If this is a dry run** (`${{ inputs.dry-run }}` is `true`): do NOT create a branch or PR. Leave the changes in the working tree and stop here.
            3. **Otherwise**, create a branch and PR:
            ```bash
            git checkout -b claude/sync-go-cli-$(echo "${{ github.sha }}" | cut -c1-7)
            git add crates/breez-sdk/bindings/examples/cli/langs/go/
            git commit -m "chore: sync Go CLI with Rust CLI changes (${{ github.sha }})"
            git push -u origin HEAD
            gh pr create --title "chore: sync Go CLI with Rust CLI changes" \
              --body "Automated sync of Go CLI from Rust CLI changes in ${{ github.sha }}" \
              --base main
            ```

            ### Step 8: No-op check
            If the Rust and Go CLIs are already in sync (no meaningful differences), do NOT create a PR. Output: "No Go CLI changes needed."

      - name: Create dry-run patch
        if: inputs.approve-run == '' && inputs.dry-run
        run: git diff HEAD -- 'crates/breez-sdk/bindings/examples/cli/langs/go/' > sync-go.patch

      - name: Upload dry-run patch
        if: inputs.approve-run == '' && inputs.dry-run
        uses: actions/upload-artifact@v4
        with:
          name: sync-go-patch
          path: sync-go.patch
          retention-days: 7

      - name: Upload Claude log
        if: always() && inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-go-claude-log
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 7
          if-no-files-found: ignore

      # ── Summary ─────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.approve-run }}" != "" ]; then
            if [ -s sync-go.patch ]; then
              echo "::notice::PR created from approved dry-run ${{ inputs.approve-run }}"
            else
              echo "::notice::Patch from dry-run ${{ inputs.approve-run }} was empty — no changes needed."
            fi
          elif [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — Go CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if [ -f sync-findings.md ]; then
              echo "#### Findings" >> "$GITHUB_STEP_SUMMARY"
              cat sync-findings.md >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -s sync-go.patch ]; then
              echo "#### Patch" >> "$GITHUB_STEP_SUMMARY"
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              cat sync-go.patch >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "To approve, re-run this workflow with \`approve-run\` set to \`${{ github.run_id }}\`." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No Go CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "::notice::Dry run completed — no PR created. See job summary for diff."
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
