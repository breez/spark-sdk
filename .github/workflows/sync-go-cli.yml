# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/go.toml
name: Sync Go CLI from Rust CLI

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      diff_summary:
        description: 'Summary of Rust CLI changes (from umbrella workflow)'
        required: false
        type: string

concurrency:
  group: sync-go-cli-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-go-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine diff summary
        id: diff-info
        run: |
          if [ -n "${{ inputs.diff_summary }}" ]; then
            # Called from umbrella workflow — use provided summary
            {
              echo "diff_summary<<EODIFF"
              echo "${{ inputs.diff_summary }}"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger — always run, generate diff from HEAD~1
            echo "Manual trigger — running sync"
            {
              echo "diff_summary<<EODIFF"
              git diff --stat HEAD~1 HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md' || echo "Manual trigger (workflow_dispatch)"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No diff summary provided and not a manual trigger"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Go CLI
        if: steps.diff-info.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            Read,Write,Edit,Glob,Grep,
            Bash(git diff:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git log:*),Bash(git status:*),
            Bash(gh pr create:*),Bash(gh pr list:*)
          prompt: |
            ## Task: Sync Go CLI with Rust CLI changes

            A commit was just pushed to `main` that changed the Rust CLI source files.
            Your job is to update the Go CLI to match.

            ### What changed
            ${{ steps.diff-info.outputs.diff_summary }}

            ### Step 1: Analyze the diff
            Run: `git diff HEAD~1 HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md'`
            Then read the current Rust files for full context.

            ### Step 2: File mapping


            | Rust source | Go target |
            |-------------|-----------|
            | `crates/breez-sdk/cli/src/main.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/main.go` |
            | `crates/breez-sdk/cli/src/command/mod.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/commands.go` |
            | `crates/breez-sdk/cli/src/command/issuer.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/issuer.go` |
            | `crates/breez-sdk/cli/src/persist.rs` | `crates/breez-sdk/bindings/examples/cli/langs/go/persistence.go` |
            | `crates/breez-sdk/cli/README.md` | `crates/breez-sdk/bindings/examples/cli/langs/go/README.md` |

            `serialization.go` is Go-only (Rust uses serde). Don't touch it unless adding a new serialization helper.

            **New command subgroup files** (like `contacts.rs`): If the Rust CLI adds a new `command/<name>.rs` subgroup (similar to `issuer.rs`), create a matching Go file at `crates/breez-sdk/bindings/examples/cli/langs/go/<name>.go` following the same pattern as `issuer.go`: a dispatch function, a command registry, and handler functions.

            **Platform-specific Rust modules** (like `seedless_restore/`): Some Rust CLI directories contain platform-specific utilities (passkey/FIDO2/YubiKey). If these add new CLI flags or options to `main.rs`, implement the Go equivalent where feasible. If a feature depends on Rust-only crates with no Go equivalent, add the CLI flags but 'use `handleNotYetSupported` as the handler'. Always check if the README was also updated and sync documentation accordingly.

            ### Step 3: Translation rules


            **Commands:**
            - Rust `Command` enum PascalCase → Go kebab-case command names in registry
            - New commands need: `handleXxx` function, `BuildCommandRegistry()` entry, `CommandNames` entry

            **Arguments:**
            - `#[arg(short = 'x', long)]` → `fs.String("x", default, desc)` + `fs.StringVar(&v, "long-name", default, desc)`
            - `Option<T>` → pointer type (`*string`, `*uint64`)
            - `Vec<T>` → `stringSliceFlag` custom type (implements `flag.Value`)
            - `#[arg(action = clap::ArgAction::SetTrue)]` → `fs.Bool("name", false, desc)`

            **SDK calls:**
            - `sdk.method(Request { field1, field2 })` → `sdk.Method(breez_sdk_spark.MethodRequest{Field1: val, Field2: val})`
            - Return types: `result, err := sdk.Method(req)` with `if err != nil { return err }`

            **Enums:**
            - `EnumType::Variant { field }` → `breez_sdk_spark.EnumTypeVariant{Field: field}`
            - `EnumType::Variant` (unit) → `breez_sdk_spark.EnumTypeVariant{}`
            - Pattern match → `switch v := val.(type) { case breez_sdk_spark.EnumTypeVariant: ... }`

            **Interactive prompts:**
            - `rl.readline(prompt)` → `readlinePrompt(rl, prompt)` or `readlineWithDefault(rl, prompt, default)`

            **Output:**
            - `print_value(&v)?` → `printValue(v)`

            **Errors:**
            - `return Err(anyhow!("msg"))` → `return fmt.Errorf("msg")`

            **SDK version:**
            The Go CLI uses the published Go SDK. You can check available SDK methods by reading the Go source in the module cache (e.g. `go/pkg/mod/github.com/breez/breez-sdk-spark-go@*/breez_sdk_spark/breez_sdk_spark.go`). All commands should be fully implemented — do not use stub handlers.

            **Subcommand groups (like Issuer, Contacts):**
            - Rust `Command::GroupName(SubCommand)` dispatches to `group::handle_command()`
            - Go: main REPL checks `cmdName == "group"` and calls `DispatchGroupCommand(args, rl)`
            - Each group has its own file with `CommandNames`, `BuildRegistry()`, dispatch function, handlers

            **Go-specific UniFFI quirks:**
            - Go UniFFI enum variants use `Field0` for unnamed fields (e.g., `InputTypeLnurlPay.Field0` not `.Data`)
            - `u128` type alias is `*big.Int` — so `Amount u128` means `Amount *big.Int`, and `Amount *u128` means `Amount **big.Int`
            - Go UniFFI bindings return `*SdkError` which is a typed nil on success. Use `liftError(err)` to convert to untyped nil before `err != nil` checks.


            ### Step 3b: Documentation sync rules

            When `crates/breez-sdk/cli/README.md` changes, update the Go CLI README at
            `crates/breez-sdk/bindings/examples/cli/langs/go/README.md` to reflect the same
            features and configuration options, but with Go-specific syntax and usage:

            - **New features/sections**: If the Rust README adds documentation for a new feature
              (e.g., seedless restore, new CLI flags), add an equivalent section to the Go README
              with Go-specific build and run commands (`make run` instead of `cargo run --`).
            - **CLI option changes**: If new `--flags` are documented, translate `cargo run -- --flag`
              to `./breez-cli --flag` and update the CLI Options table.
            - **Rust-only features**: If a feature is Rust-only (e.g., requires `--features fido2`
              cargo flag, uses YubiKey OTP crates), document it as "Not yet available in Go CLI"
              or skip it if it has no Go equivalent at all.
            - **Do NOT copy verbatim**: Rewrite documentation in the style of the existing Go
              README. Keep the existing structure (Prerequisites, Quick Start, Makefile Targets,
              CLI Options, Environment Variables, Available Commands, Development).
            - **Preserve existing Go-specific content**: Don't remove the Makefile targets,
              go build instructions, or Go-specific notes.

            ### Step 4: Scope constraint
            ONLY modify files under: `crates/breez-sdk/bindings/examples/cli/langs/go/`
            Do NOT modify any other files.

            ### Step 5: Verify and create PR
            After making changes:
            1. Read back each modified file to verify correctness
            2. Create a branch and PR:
            ```bash
            git checkout -b claude/sync-go-cli-$(echo "${{ github.sha }}" | cut -c1-7)
            git add crates/breez-sdk/bindings/examples/cli/langs/go/
            git commit -m "chore: sync Go CLI with Rust CLI changes (${{ github.sha }})"
            git push -u origin HEAD
            gh pr create --title "chore: sync Go CLI with Rust CLI changes" \
              --body "Automated sync of Go CLI from Rust CLI changes in ${{ github.sha }}" \
              --base main
            ```

            ### Step 6: No-op check
            If the Rust changes don't affect CLI commands or documentation (e.g., only Cargo.toml changes or internal-only refactoring with no user-facing impact), do NOT create a PR. Output: "No Go CLI changes needed."

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.diff-info.outputs.has_changes }}" != "true" ]; then
            echo "::notice::No changes to sync — skipping"
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
