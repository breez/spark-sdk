# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/swift.toml
name: Sync Swift CLI from Rust CLI

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: 'Optional base commit SHA to diff against (leave empty for full comparison)'
        required: false
        type: string
      dry-run:
        description: 'Run the sync without creating a PR (test mode)'
        required: false
        type: boolean
        default: false
      approve-run:
        description: 'Run ID of a previous dry-run to approve (applies cached diff and creates PR)'
        required: false
        type: string
  workflow_run:
    workflows: ["Sync CLI Languages"]
    types: [completed]

concurrency:
  group: sync-swift-cli-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-swift-cli:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Validate inputs
        if: inputs.dry-run && inputs.approve-run != ''
        run: |
          echo "::error::Cannot use dry-run and approve-run together."
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Approve flow ────────────────────────────────────────────────
      - name: Download dry-run patch
        if: inputs.approve-run != ''
        uses: actions/download-artifact@v4
        with:
          name: sync-swift-patch
          run-id: ${{ inputs.approve-run }}
          github-token: ${{ github.token }}

      - name: Apply patch and create PR
        if: inputs.approve-run != ''
        run: |
          if [ ! -s sync-swift.patch ]; then
            echo "::notice::Patch is empty — no changes to apply."
            exit 0
          fi
          if ! git apply sync-swift.patch; then
            echo "::error::Patch failed to apply — the target files may have changed since the dry-run. Run a new dry-run instead."
            exit 1
          fi
          make -C crates/breez-sdk/bindings/examples/cli check-swift
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b claude/sync-swift-cli-$(echo "${{ github.sha }}" | cut -c1-7)
          git add crates/breez-sdk/bindings/examples/cli/langs/swift/
          git commit -m "chore: sync Swift CLI with Rust CLI changes (${{ github.sha }})"
          git push -u origin HEAD
          gh pr create --title "chore: sync Swift CLI with Rust CLI changes" \
            --body "Automated sync of Swift CLI from Rust CLI changes in ${{ github.sha }}. Approved from dry-run https://github.com/${{ github.repository }}/actions/runs/${{ inputs.approve-run }}" \
            --base main

      # ── Normal / dry-run flow ───────────────────────────────────────
      - name: Compute diff info
        if: inputs.approve-run == ''
        id: diff-info
        run: |
          DIFF_BASE="${{ inputs.base-sha }}"
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
              echo "::error::Provided base-sha ($DIFF_BASE) not found in repository."
              exit 1
            fi
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "Rust CLI changes since $DIFF_BASE:"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "No base SHA provided — perform a full comparison of the Rust CLI against the Swift CLI."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Swift CLI
        if: inputs.approve-run == ''
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --allowed-tools
            Read,Write,Edit,Glob,Grep,
            Bash(git diff:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git log:*),Bash(git status:*),
            Bash(gh pr create:*),Bash(gh pr list:*),
            Bash(make -C crates/breez-sdk/bindings/examples/cli check-swift:*)
          prompt: |
            ## Task: Sync Swift CLI with Rust CLI changes

            Your job is to update the Swift CLI to match the current Rust CLI.

            ### What changed
            ${{ steps.diff-info.outputs.diff_summary }}

            ### Step 1: Analyze the changes
            If a diff base was provided, run: `git diff ${{ steps.diff-info.outputs.diff_base }} HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md'`
            The diff is a hint for what changed recently, but it may not reveal all differences.

            **Always read the current Rust CLI source files and compare them against the Swift CLI.** The Rust CLI is the source of truth. Read each mapped file pair (see Step 2) and identify any divergences: missing features, outdated SDK calls, different argument sets, or removed/renamed APIs. Implement what's feasible — if a feature can't be ported (missing bindings, no equivalent package, platform limitation), add the CLI flag but 'print "Not yet supported" and return' and leave a comment explaining why.

            Also check the Swift SDK snippets at `docs/breez-sdk/snippets/` for the correct API calling conventions. The snippets are always up-to-date — if the Swift CLI uses an SDK function that doesn't appear in the snippets, it has likely been removed or renamed.

            ### Step 2: File mapping


            | Rust source | Swift target |
            |-------------|--------------|
            | `crates/breez-sdk/cli/src/main.rs` | `crates/breez-sdk/bindings/examples/cli/langs/swift/Sources/BreezCLI/main.swift` |
            | `crates/breez-sdk/cli/src/command/mod.rs` | `crates/breez-sdk/bindings/examples/cli/langs/swift/Sources/BreezCLI/Commands.swift` |
            | `crates/breez-sdk/cli/src/command/issuer.rs` | `crates/breez-sdk/bindings/examples/cli/langs/swift/Sources/BreezCLI/Issuer.swift` |
            | `crates/breez-sdk/cli/src/persist.rs` | `crates/breez-sdk/bindings/examples/cli/langs/swift/Sources/BreezCLI/Persistence.swift` |
            | `crates/breez-sdk/cli/README.md` | `crates/breez-sdk/bindings/examples/cli/langs/swift/README.md` |

            `Serialization.swift` is Swift-only (Rust uses serde). Don't touch it unless adding a new serialization helper.

            **New command subgroup files** (like `contacts.rs`): If the Rust CLI adds a new `command/<name>.rs` subgroup (similar to `issuer.rs`), create a matching Swift file at `crates/breez-sdk/bindings/examples/cli/langs/swift/<Name>.swift` following the same pattern as `Issuer.swift`: a dispatch function, a command registry, and handler functions.

            **Platform-specific Rust modules** (like `seedless_restore/`): Some Rust CLI directories contain platform-specific utilities (passkey/FIDO2/YubiKey). If these add new CLI flags or options to `main.rs`, implement the Swift equivalent where feasible. If a feature depends on Rust-only crates with no Swift equivalent, add the CLI flags but 'print "Not yet supported" and return'. Always check if the README was also updated and sync documentation accordingly.

            ### Step 3: Translation rules


            **Commands:**
            - Rust `Command` enum PascalCase → Swift kebab-case command names in registry
            - New commands need: `handleXxx` function, `buildCommandRegistry()` entry, `commandNames` entry

            **Arguments:**
            - `#[arg(short = 'x', long)]` → `FlagParser` with `.get("x", "long-name")`
            - `Option<T>` → optional type (`String?`, `UInt64?`, `BInt?`)
            - `#[arg(action = clap::ArgAction::SetTrue)]` → `FlagParser` with `.has("name")`
            - Positional args → `fp.positional[0]`, `fp.positional[1]`, etc.

            **SDK calls:**
            - `sdk.method(Request { field1, field2 })` → `try await sdk.method(req: MethodRequest(field1: val, field2: val))`
            - Return types: `let result = try await sdk.method(req:)` with `throws`
            - Free functions: `get_spark_status()` → `getSparkStatus()`

            **Enums:**
            - `EnumType::Variant { field }` → `.variant(field: value)`
            - `EnumType::Variant` (unit) → `.variant`
            - Pattern match → `switch val { case let .variant(field): ... }`
            - `InputType` variants use `v1:` label: `case let .lnurlPay(v1): ...`

            **Interactive prompts:**
            - `rl.readline(prompt)` → `readlinePrompt(prompt)` or `readlineWithDefault(prompt, defaultValue:)`

            **Output:**
            - `print_value(&v)?` → `printValue(v)`

            **Errors:**
            - `return Err(anyhow!("msg"))` → `throw` or `print("Error: msg"); return`

            **Types:**
            - `u128` → `BInt` (from BigNumber package, re-exported by BreezSdkSpark)
            - `Option<u128>` → `BInt?`
            - `Vec<T>` → `[T]`
            - `String` → `String`

            **Swift-specific UniFFI quirks:**
            - Swift UniFFI structs have memberwise initializers with optional fields defaulting to nil
            - Enum associated values use camelCase labels matching Rust field names
            - `InputType` enum cases use `v1:` label for their associated value
            - `ReceivePaymentMethod`, `SendPaymentMethod`, etc. are enums with associated values
            - SDK method parameter labels: `req:` for request objects, `input:` for parse, `reqData:` for lnurlAuth, `listener:` for addEventListener

            **Subcommand groups (like Issuer):**
            - Rust `Command::GroupName(SubCommand)` dispatches to `group::handle_command()`
            - Swift: main REPL checks `cmdName == "group"` and calls `dispatchGroupCommand(args, tokenIssuer:)`
            - Each group has its own file with dispatch function and handler functions

            **Serialization:**
            - UniFFI types are NOT Codable; use Mirror-based reflection in Serialization.swift
            - `serialize()` and `printValue()` are global functions available from any file

            **BIP39:**
            - Full BIP39 English wordlist + mnemonic generation in BIP39.swift
            - Uses CommonCrypto for SHA-256 and SecRandomCopyBytes for entropy


            ### Step 3b: Documentation sync rules

            When `crates/breez-sdk/cli/README.md` changes, update the Swift CLI README at
            `crates/breez-sdk/bindings/examples/cli/langs/swift/README.md` to reflect the same
            features and configuration options, but with Swift-specific syntax and usage:

            - **New features/sections**: If the Rust README adds documentation for a new feature
              (e.g., seedless restore, new CLI flags), add an equivalent section to the Swift README
              with Swift-specific build and run commands (`make run` instead of `cargo run --`).
            - **CLI option changes**: If new `--flags` are documented, translate `cargo run -- --flag`
              to `swift run breez-cli --flag` and update the CLI Options table.
            - **Rust-only features**: If a feature is Rust-only (e.g., requires `--features fido2`
              cargo flag, uses YubiKey OTP crates), document it as "Not yet available in Swift CLI"
              or skip it if it has no Swift equivalent at all.
            - **Do NOT copy verbatim**: Rewrite documentation in the style of the existing Swift
              README. Keep the existing structure (Prerequisites, Quick Start, Makefile Targets,
              CLI Options, Environment Variables, Available Commands, Development).
            - **Preserve existing Swift-specific content**: Don't remove the Makefile targets,
              Swift build instructions, SPM setup, or Swift-specific notes.

            ### Step 4: Scope constraint
            ONLY modify files under: `crates/breez-sdk/bindings/examples/cli/langs/swift/`
            Do NOT modify any other files.

            ### Step 5: Build check
            After making changes, verify the code is syntactically valid:
            ```bash
            make -C crates/breez-sdk/bindings/examples/cli check-swift
            ```
            If any check fails, fix the errors before proceeding.

            ### Step 6: Verify and create PR
            After making changes:
            1. Read back each modified file to verify correctness
            2. **If this is a dry run** (`${{ inputs.dry-run }}` is `true`): do NOT create a branch or PR. Leave the changes in the working tree and stop here.
            3. **Otherwise**, create a branch and PR:
            ```bash
            git checkout -b claude/sync-swift-cli-$(echo "${{ github.sha }}" | cut -c1-7)
            git add crates/breez-sdk/bindings/examples/cli/langs/swift/
            git commit -m "chore: sync Swift CLI with Rust CLI changes (${{ github.sha }})"
            git push -u origin HEAD
            gh pr create --title "chore: sync Swift CLI with Rust CLI changes" \
              --body "Automated sync of Swift CLI from Rust CLI changes in ${{ github.sha }}" \
              --base main
            ```

            ### Step 7: No-op check
            If the Rust and Swift CLIs are already in sync (no meaningful differences), do NOT create a PR. Output: "No Swift CLI changes needed."

      - name: Create dry-run patch
        if: inputs.approve-run == '' && inputs.dry-run
        run: git diff HEAD -- 'crates/breez-sdk/bindings/examples/cli/langs/swift/' > sync-swift.patch

      - name: Upload dry-run patch
        if: inputs.approve-run == '' && inputs.dry-run
        uses: actions/upload-artifact@v4
        with:
          name: sync-swift-patch
          path: sync-swift.patch
          retention-days: 7

      - name: Upload Claude log
        if: always() && inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-swift-claude-log
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 7
          if-no-files-found: ignore

      # ── Summary ─────────────────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          if [ "${{ inputs.approve-run }}" != "" ]; then
            if [ -s sync-swift.patch ]; then
              echo "::notice::PR created from approved dry-run ${{ inputs.approve-run }}"
            else
              echo "::notice::Patch from dry-run ${{ inputs.approve-run }} was empty — no changes needed."
            fi
          elif [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — Swift CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if [ -s sync-swift.patch ]; then
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              cat sync-swift.patch >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "To approve, re-run this workflow with \`approve-run\` set to \`${{ github.run_id }}\`." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No Swift CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "::notice::Dry run completed — no PR created. See job summary for diff."
          else
            echo "::notice::Claude Code sync completed — check for new PR"
          fi
