# DO NOT EDIT — generated by sync-prompts/generate.py
# Source: sync-prompts/prompt-template.md + sync-prompts/langs/dart.toml
name: Sync Dart CLI from Rust CLI

on:
  workflow_dispatch:
    inputs:
      base-sha:
        description: 'Base commit SHA to diff against (leave empty to auto-detect from last sync commit)'
        required: false
        type: string
      dry-run:
        description: 'Run the sync without creating a PR (test mode)'
        required: false
        type: boolean
        default: false
  workflow_run:
    workflows: ["Sync CLI Languages"]
    types: [completed]

concurrency:
  group: sync-dart-cli-${{ github.sha }}
  cancel-in-progress: true

jobs:
  sync-dart-cli:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff info
        id: diff-info
        run: |
          # Determine diff base. Priority:
          # 1. Explicit base-sha from workflow_dispatch input
          # 2. Auto-detect: last commit that touched this language CLI (= last sync point)
          DIFF_BASE="${{ inputs.base-sha }}"
          if [ -z "$DIFF_BASE" ] || [ "$DIFF_BASE" = "0000000000000000000000000000000000000000" ]; then
            DIFF_BASE=$(git log -1 --format=%H -- 'crates/breez-sdk/bindings/examples/cli/langs/dart/')
            if [ -n "$DIFF_BASE" ]; then
              echo "Auto-detected diff base from last sync commit: $DIFF_BASE"
            fi
          fi

          if [ -n "$DIFF_BASE" ]; then
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md'
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            # No language CLI commits yet — first sync
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "First sync — no previous language CLI commits found. Do a full comparison."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Sync Dart CLI
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: >-
            --allowed-tools
            Read,Write,Edit,Glob,Grep,
            Bash(git diff:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git log:*),Bash(git status:*),
            Bash(gh pr create:*),Bash(gh pr list:*),
            Bash(make -C crates/breez-sdk/bindings/examples/cli check-dart:*)
          prompt: |
            ## Task: Sync Dart CLI with Rust CLI changes

            Your job is to update the Dart CLI to match the current Rust CLI.

            ### What changed
            ${{ steps.diff-info.outputs.diff_summary }}

            ### Step 1: Analyze the changes
            If a diff base was provided, run: `git diff ${{ steps.diff-info.outputs.diff_base }} HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md'`
            Otherwise (manual trigger without a base SHA), read the full Rust CLI source files and compare them against the current Dart CLI to identify all differences.
            Always read the current Rust files for full context.

            ### Step 2: File mapping


            | Rust source | Dart target |
            |-------------|-------------|
            | `crates/breez-sdk/cli/src/main.rs` | `crates/breez-sdk/bindings/examples/cli/langs/dart/lib/cli.dart` |
            | `crates/breez-sdk/cli/src/command/mod.rs` | `crates/breez-sdk/bindings/examples/cli/langs/dart/lib/commands.dart` |
            | `crates/breez-sdk/cli/src/command/issuer.rs` | `crates/breez-sdk/bindings/examples/cli/langs/dart/lib/issuer.dart` |
            | `crates/breez-sdk/cli/src/persist.rs` | `crates/breez-sdk/bindings/examples/cli/langs/dart/lib/persistence.dart` |
            | `crates/breez-sdk/cli/README.md` | `crates/breez-sdk/bindings/examples/cli/langs/dart/README.md` |

            `serialization.dart` is Dart-only (Rust uses serde). Don't touch it unless adding a new serialization helper.

            **New command subgroup files** (like `contacts.rs`): If the Rust CLI adds a new `command/<name>.rs` subgroup (similar to `issuer.rs`), create a matching Dart file at `crates/breez-sdk/bindings/examples/cli/langs/dart/lib/<name>.dart` following the same pattern as `issuer.dart`: a dispatch function, a command registry, and handler functions.

            **Platform-specific Rust modules** (like `seedless_restore/`): Some Rust CLI directories contain platform-specific utilities (passkey/FIDO2/YubiKey). If these add new CLI flags or options to `main.rs`, implement the Dart equivalent where feasible. If a feature depends on Rust-only crates with no Dart equivalent, add the CLI flags but 'print a "not yet supported" message in the handler'. Always check if the README was also updated and sync documentation accordingly.

            ### Step 3: Translation rules


            **Commands:**
            - Rust `Command` enum PascalCase → Dart kebab-case command names in registry
            - New commands need: handler function, `buildCommandRegistry()` entry, `commandNames` entry

            **Arguments:**
            - `#[arg(short = 'x', long)]` → `..addOption('long-name', abbr: 'x')`
            - `Option<T>` → nullable Dart type, `results.option('name')` returns `String?`
            - `Vec<T>` → `..addMultiOption('name')`, returns `List<String>`
            - `#[arg(action = clap::ArgAction::SetTrue)]` → `..addFlag('name', defaultsTo: false)`

            **SDK calls:**
            - `sdk.method(Request { field1, field2 })` → `await sdk.methodName(request: RequestType(field1: val, field2: val))`
            - Method names are camelCase: `get_info` → `getInfo`, `prepare_send_payment` → `prepareSendPayment`

            **Enums:**
            - `EnumType::Variant { field }` → `EnumType.variant(field: field)` (factory constructor)
            - `EnumType::Variant` (unit) → `EnumType.variant` or `EnumType.variant()` (depends on variant)
            - Pattern match → `if (val is EnumType_Variant)` or `switch (val) { case EnumType_Variant(): ... }`

            **Interactive prompts:**
            - `rl.readline(prompt)` → `prompt(message)` or `prompt(message, defaultValue: 'y')` (uses stdin.readLineSync)

            **REPL / Readline:**
            - The Dart CLI has a custom `Readline` class in `lib/readline.dart` (raw stdin mode) providing tab completion and persistent command history. No Dart packages exist for interactive REPL completion — `cli_completion` and `very_good_cli` are for non-interactive CLIs only.
            - The REPL loop in `cli.dart` uses `rl.readLine(promptStr)` instead of `stdin.readLineSync()`.
            - Completion list is assembled from `commandNames + issuerCommandNames + ['exit', 'quit', 'help']`. When adding a new command group, add its command names to this list.
            - History is saved to a file via `rl.close()` after the REPL loop exits.

            **Per-command help:**
            - Commands using `ArgParser` should parse via `_parseArgs(parser, args, usageString)` — it intercepts `help`/`--help`/`-h` before parsing and catches `ArgParserException` to show usage when mandatory args are missing.
            - Simple positional-arg commands should check `args.first == 'help' || args.first == '--help'` before proceeding.
            - Use the `help:` parameter on `addOption()` for important options (e.g., `--method` lists available values like "sparkaddress, sparkinvoice, bitcoin, bolt11").

            **Process exit:**
            - `bin/breez_cli.dart` must call `exit(0)` after `runCli()` returns. The native FFI library (flutter_rust_bridge) keeps background threads alive after `sdk.disconnect()`, preventing the Dart VM from exiting cleanly.

            **Output / Serialization:**
            - `print_value(&v)?` → `printValue(v)`
            - `serialization.dart` uses `dart:mirrors` to reflectively serialize any FRB-generated class to JSON. Do NOT add manual `toJson()` extensions — all public fields are discovered automatically via reflection. Keep the `objToSerializable` function generic and type-agnostic.

            **Errors:**
            - `return Err(anyhow!("msg"))` → `print("msg"); return;`

            **SDK version:**
            The Dart CLI uses the Flutter/FRB SDK bindings (breez_sdk_spark_flutter). Reference the Flutter snippets in `docs/breez-sdk/snippets/flutter/lib/` for exact API patterns. All commands should be fully implemented — do not use stub handlers.

            **Subcommand groups (like Issuer, Contacts):**
            - Rust `Command::GroupName(SubCommand)` dispatches to `group::handle_command()`
            - Dart: main REPL checks `cmdName == 'group'` and calls `dispatchGroupCommand(args, ...)`
            - Each group has its own file with `commandNames`, registry, dispatch function, handlers

            **Dart/FRB-specific quirks:**
            - `await BreezSdkSparkLib.init()` must be called once before any SDK usage.
            - FRB enum variants use sealed class pattern: `InputType_LnurlPay`, `SdkEvent_Synced`, etc.
            - Unnamed fields use `.field0` accessor (e.g., `InputType_LnurlPay.field0` is the `LnurlPayRequestDetails`).
            - `u128`/`u64` maps to Dart `BigInt` — use `BigInt.parse(str)` and `BigInt.from(int)`. **All arithmetic on BigInt must use BigInt operands**: `value ~/ BigInt.from(1000)`, NOT `value ~/ 1000`. For ceiling division: `(value + BigInt.from(divisor - 1)) ~/ BigInt.from(divisor)`.
            - FRB `Config` is immutable. The `breez_sdk_spark_flutter` package provides a `ConfigCopyWith` extension (in `lib/src/config_extensions.dart`) that adds `copyWith`. If Config fields change upstream, update the extension to match.
            - When parsing enum strings from user input, match the Rust `Display`/`FromStr` impl (PascalCase, e.g., `WaitingForPreimage`, `PreimageShared`), not snake_case.
            - Events come from `sdk.addEventListener()` which returns a `Stream<SdkEvent>`, not callbacks.
            - `SdkBuilder` methods that take `self` in Rust (like `withDefaultStorage`, `withKeySet`) **consume** the builder. You MUST capture the return value: `builder = builder.withDefaultStorage(storageDir: dir)`. Ignoring the return value causes a `DroppableDisposedException` at runtime.
            - `BreezSdkSparkLib.init()` requires `externalLibrary: ExternalLibrary.open(path)` when running as a pure Dart CLI (not a Flutter app), because FRB can't find the native library via the Flutter framework loader.


            ### Step 3b: Documentation sync rules

            When `crates/breez-sdk/cli/README.md` changes, update the Dart CLI README at
            `crates/breez-sdk/bindings/examples/cli/langs/dart/README.md` to reflect the same
            features and configuration options, but with Dart-specific syntax and usage:

            - **New features/sections**: If the Rust README adds documentation for a new feature
              (e.g., seedless restore, new CLI flags), add an equivalent section to the Dart README
              with Dart-specific setup commands (`make run` instead of `cargo run --`), and Dart-specific configuration.
            - **CLI option changes**: If new `--flags` are documented, translate `cargo run -- --flag`
              to `dart run bin/breez_cli.dart --flag` and update the CLI Options table.
            - **Rust-only features**: If a feature is Rust-only (e.g., requires `--features fido2`
              cargo flag, uses YubiKey OTP crates), document it as "Not yet available in Dart CLI"
              or skip it if it has no Dart equivalent at all.
            - **Do NOT copy verbatim**: Rewrite documentation in the style of the existing Dart
              README. Keep the existing structure (Prerequisites, Quick Start, Makefile Targets,
              CLI Options, Environment Variables, Available Commands, Development).
            - **Preserve existing Dart-specific content**: Don't remove the Makefile targets,
              Flutter pub get instructions, or Dart/FRB-specific notes.

            ### Step 4: Scope constraint
            ONLY modify files under: `crates/breez-sdk/bindings/examples/cli/langs/dart/`
            Do NOT modify any other files.

            ### Step 5: Build check
            After making changes, verify the code is syntactically valid:
            ```bash
            make -C crates/breez-sdk/bindings/examples/cli check-dart
            ```
            If any check fails, fix the errors before proceeding.

            ### Step 6: Verify and create PR
            After making changes:
            1. Read back each modified file to verify correctness
            2. **If this is a dry run** (`${{ inputs.dry-run }}` is `true`): do NOT create a branch or PR. Instead, output a summary of all changes you made (files modified, what changed in each) and end with: "Dry run complete — no PR created."
            3. **Otherwise**, create a branch and PR:
            ```bash
            git checkout -b claude/sync-dart-cli-$(echo "${{ github.sha }}" | cut -c1-7)
            git add crates/breez-sdk/bindings/examples/cli/langs/dart/
            git commit -m "chore: sync Dart CLI with Rust CLI changes (${{ github.sha }})"
            git push -u origin HEAD
            gh pr create --title "chore: sync Dart CLI with Rust CLI changes" \
              --body "Automated sync of Dart CLI from Rust CLI changes in ${{ github.sha }}" \
              --base main
            ```

            ### Step 7: No-op check
            If the Rust changes don't affect CLI commands or documentation (e.g., only Cargo.toml changes or internal-only refactoring with no user-facing impact), do NOT create a PR. Output: "No Dart CLI changes needed."

      - name: Summary
        if: always()
        run: |
          echo "::notice::Claude Code sync completed — check for new PR"
