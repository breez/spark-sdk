# Syncs language CLIs (Flutter, Go, Python, Swift, WASM, C#, Kotlin Multiplatform, React Native) with the Rust CLI.
#
# Two-phase approach:
#   1. Plan  — A single Claude session analyzes the Rust CLI diff and determines which
#              languages actually need syncing, producing a JSON manifest (sync-plan.json).
#   2. Sync  — Only the languages identified by the planner run Claude sessions.
#
# Each language's prompt is assembled at runtime from:
#   sync-prompts/prompt-template.md  +  sync-prompts/langs/<lang>.toml
#
# All language changes are consolidated into a single PR (instead of one per language).
#
# To add a new language: create a TOML in sync-prompts/langs/ and add a
# matrix entry below.

name: Sync CLI Languages

on:
  repository_dispatch:
    types: [sync-cli]
  workflow_dispatch:
    inputs:
      languages:
        description: 'Languages to sync (remove what you do not want)'
        required: false
        default: '["csharp", "flutter", "golang", "kotlin-multiplatform", "python", "react-native", "swift", "wasm"]'
        type: string
      base-sha:
        description: 'Base commit SHA to diff against (leave empty for full comparison)'
        required: false
        type: string
      dry-run:
        description: 'Test mode — no PR created'
        required: false
        type: boolean
        default: false
      approve-run:
        description: 'Run ID of a previous dry-run to approve (set languages to match)'
        required: false
        type: string
      skip-planning:
        description: 'Skip the planning phase and sync all specified languages directly'
        required: false
        type: boolean
        default: false

concurrency:
  group: sync-cli
  cancel-in-progress: true

jobs:
  # ── Build a filtered matrix from the `languages` input ──────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Build matrix
        id: set
        env:
          REQUESTED: ${{ inputs.languages }}
        run: |
          ALL='[
            {"lang":"csharp","runner":"ubuntu-latest","timeout":30},
            {"lang":"flutter","runner":"ubuntu-latest","timeout":30},
            {"lang":"golang","runner":"ubuntu-latest","timeout":30},
            {"lang":"kotlin-multiplatform","runner":"ubuntu-latest","timeout":30},
            {"lang":"python","runner":"ubuntu-latest","timeout":30},
            {"lang":"react-native","runner":"ubuntu-latest","timeout":30},
            {"lang":"swift","runner":"macos-latest","timeout":30},
            {"lang":"wasm","runner":"ubuntu-latest","timeout":30}
          ]'
          if [ -z "$REQUESTED" ]; then
            echo "matrix={\"include\":$(echo "$ALL" | jq -c '.')}" >> "$GITHUB_OUTPUT"
          else
            FILTERED=$(echo "$ALL" | jq -c --argjson langs "$REQUESTED" \
              '[.[] | select(.lang as $l | $langs | index($l))]')
            if [ "$FILTERED" = "[]" ]; then
              echo "::error::No valid languages in: $REQUESTED (available: csharp, flutter, golang, kotlin-multiplatform, python, react-native, swift, wasm)"
              exit 1
            fi
            echo "matrix={\"include\":$FILTERED}" >> "$GITHUB_OUTPUT"
          fi

  # ── Phase 1: Plan which languages need syncing ──────────────────
  plan:
    name: Plan
    needs: setup
    if: ${{ !inputs.skip-planning && inputs.approve-run == '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: read
      id-token: write
      actions: read

    outputs:
      languages: ${{ steps.extract.outputs.languages }}
      manifest: ${{ steps.extract.outputs.manifest }}
      skipped: ${{ steps.extract.outputs.skipped }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute diff info
        id: diff-info
        run: |
          DIFF_BASE="${{ inputs.base-sha || github.event.client_payload['base-sha'] }}"
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
              echo "::error::Provided base-sha ($DIFF_BASE) not found in repository."
              exit 1
            fi
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "Rust CLI changes since $DIFF_BASE:"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "No base SHA provided — perform a full comparison of the Rust CLI against all language CLIs."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Generate planner prompt
        id: plan-prompt
        env:
          DIFF_SUMMARY: ${{ steps.diff-info.outputs.diff_summary }}
          DIFF_BASE: ${{ steps.diff-info.outputs.diff_base }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, "crates/breez-sdk/bindings/examples/cli/sync-prompts")
          from generate import generate_planner_prompt

          prompt = generate_planner_prompt()

          # Resolve runtime variables
          replacements = {
              "{{DIFF_SUMMARY}}": os.environ.get("DIFF_SUMMARY", ""),
              "{{DIFF_BASE}}": os.environ.get("DIFF_BASE", ""),
          }
          for expr, value in replacements.items():
              prompt = prompt.replace(expr, value)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("content<<EOPLAN_DELIM_9b2f\n")
              f.write(prompt)
              f.write("\nEOPLAN_DELIM_9b2f\n")
          PYEOF

      - name: Run planner
        id: run-planner
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --model claude-opus-4-6
            --allowed-tools
            Read,Grep,Glob,Write(sync-plan.json:*),Bash(git diff:*),Bash(git log:*)
          prompt: ${{ steps.plan-prompt.outputs.content }}

      - name: Extract plan
        id: extract
        env:
          ALL_LANGS: ${{ needs.setup.outputs.matrix }}
        run: |
          if [ ! -f sync-plan.json ]; then
            echo "::warning::Planner did not produce sync-plan.json — falling back to all languages"
            # Fall back to all languages from the matrix
            LANGS=$(echo "$ALL_LANGS" | jq -c '[.include[].lang]')
            echo "languages=$LANGS" >> "$GITHUB_OUTPUT"
            echo "manifest={}" >> "$GITHUB_OUTPUT"
            echo "skipped=Planner did not produce a plan" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate JSON
          if ! jq empty sync-plan.json 2>/dev/null; then
            echo "::warning::sync-plan.json is not valid JSON — falling back to all languages"
            LANGS=$(echo "$ALL_LANGS" | jq -c '[.include[].lang]')
            echo "languages=$LANGS" >> "$GITHUB_OUTPUT"
            echo "manifest={}" >> "$GITHUB_OUTPUT"
            echo "skipped=Invalid plan JSON" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LANGS=$(jq -c '.languages // []' sync-plan.json)
          MANIFEST=$(jq -c '.per_language // {}' sync-plan.json)
          SKIPPED=$(jq -c '.skipped // {}' sync-plan.json)

          echo "languages=$LANGS" >> "$GITHUB_OUTPUT"
          echo "manifest=$MANIFEST" >> "$GITHUB_OUTPUT"
          echo "skipped=$SKIPPED" >> "$GITHUB_OUTPUT"

          LANG_COUNT=$(echo "$LANGS" | jq 'length')
          echo "::notice::Planner identified $LANG_COUNT language(s) to sync: $(echo "$LANGS" | jq -r 'join(", ")')"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-plan
          path: sync-plan.json
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        env:
          LANGS: ${{ steps.extract.outputs.languages }}
          SKIPPED: ${{ steps.extract.outputs.skipped }}
        run: |
          echo "## Sync CLI Plan" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Languages to sync:** $(echo "$LANGS" | jq -r 'join(", ") // "none"')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$SKIPPED" != "{}" ] && [ -n "$SKIPPED" ]; then
            echo "**Skipped:**" >> "$GITHUB_STEP_SUMMARY"
            echo "$SKIPPED" | jq -r 'to_entries[] | "- **\(.key)**: \(.value)"' >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Phase 2: Sync identified languages ─────────────────────────
  # Build the sync matrix from planner output (or fall back to setup matrix when planning is skipped)
  build-sync-matrix:
    name: Build sync matrix
    needs: [setup, plan]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
      has_languages: ${{ steps.build.outputs.has_languages }}
    steps:
      - name: Build filtered matrix
        id: build
        env:
          FULL_MATRIX: ${{ needs.setup.outputs.matrix }}
          PLAN_LANGS: ${{ needs.plan.outputs.languages }}
          SKIP_PLANNING: ${{ inputs.skip-planning }}
          PLAN_SKIPPED: ${{ needs.plan.result }}
        run: |
          # If planning was skipped or didn't run, use the full matrix
          if [ "$SKIP_PLANNING" = "true" ] || [ "$PLAN_SKIPPED" = "skipped" ]; then
            echo "matrix=$FULL_MATRIX" >> "$GITHUB_OUTPUT"
            echo "has_languages=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Filter the full matrix to only include languages from the plan
          if [ -z "$PLAN_LANGS" ] || [ "$PLAN_LANGS" = "[]" ] || [ "$PLAN_LANGS" = "null" ]; then
            echo "::notice::No languages to sync — skipping all sync jobs"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has_languages=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILTERED=$(echo "$FULL_MATRIX" | jq -c --argjson langs "$PLAN_LANGS" \
            '{include: [.include[] | select(.lang as $l | $langs | index($l))]}')

          LANG_COUNT=$(echo "$FILTERED" | jq '.include | length')
          if [ "$LANG_COUNT" -eq 0 ]; then
            echo "::notice::No matching languages in matrix"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            echo "has_languages=false" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$FILTERED" >> "$GITHUB_OUTPUT"
            echo "has_languages=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Syncing $LANG_COUNT language(s)"
          fi

  sync:
    name: ${{ matrix.lang }}
    needs: [setup, plan, build-sync-matrix]
    if: ${{ !cancelled() && needs.build-sync-matrix.outputs.has_languages == 'true' }}

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-sync-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}

    permissions:
      contents: read
      id-token: write
      actions: read

    steps:
      - name: Validate inputs
        if: inputs.dry-run && inputs.approve-run != ''
        run: |
          echo "::error::Cannot use dry-run and approve-run together."
          exit 1

      - name: Checkout repository
        if: inputs.approve-run == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Load per-language config from TOML ──────────────────────────
      - name: Load language config
        if: inputs.approve-run == ''
        id: config
        env:
          LANG: ${{ matrix.lang }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, "crates/breez-sdk/bindings/examples/cli/sync-prompts")
          from generate import load_lang_config

          config = load_lang_config(os.environ["LANG"])

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              for key in ("lang_name", "lang_id", "target_dir"):
                  f.write(f"{key}={config.get(key, '')}\n")

              # Flatten allowed_tools to a single comma-separated line
              tools = config.get("allowed_tools", "")
              tools_line = ",".join(
                  part.strip()
                  for line in tools.strip().splitlines()
                  for part in line.split(",")
                  if part.strip()
              )
              f.write(f"allowed_tools={tools_line}\n")
          PYEOF

      # ── Normal / dry-run flow ───────────────────────────────────────
      - name: Compute diff info
        if: inputs.approve-run == ''
        id: diff-info
        env:
          LANG_NAME: ${{ steps.config.outputs.lang_name }}
        run: |
          DIFF_BASE="${{ inputs.base-sha || github.event.client_payload['base-sha'] }}"
          if [ -n "$DIFF_BASE" ] && [ "$DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            if ! git cat-file -e "$DIFF_BASE" 2>/dev/null; then
              echo "::error::Provided base-sha ($DIFF_BASE) not found in repository."
              exit 1
            fi
            echo "diff_base=$DIFF_BASE" >> "$GITHUB_OUTPUT"
            DIFF_STAT=$(git diff --stat "$DIFF_BASE" HEAD -- 'crates/breez-sdk/cli/src/' 'crates/breez-sdk/cli/README.md')
            {
              echo "diff_summary<<EODIFF"
              echo "Rust CLI changes since $DIFF_BASE:"
              echo "$DIFF_STAT"
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "diff_base=" >> "$GITHUB_OUTPUT"
            {
              echo "diff_summary<<EODIFF"
              echo "No base SHA provided — perform a full comparison of the Rust CLI against the ${LANG_NAME} CLI."
              echo "EODIFF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── Language-specific setup ─────────────────────────────────────
      - name: Set up Flutter
        if: matrix.lang == 'flutter' && inputs.approve-run == ''
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.3

      # Kotlin and Swift skip build checks during sync (deferred to cli-ci.yml on the PR).
      # Only Go and C# still need setup-build for their lightweight checks.
      - name: Set up build environment
        if: (matrix.lang == 'golang' || matrix.lang == 'csharp') && inputs.approve-run == ''
        uses: ./.github/actions/setup-build
        with:
          github-token: ${{ github.token }}

      - name: Set up Go
        if: matrix.lang == 'golang' && inputs.approve-run == ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.19'

      - name: Set up Node.js
        if: (matrix.lang == 'wasm' || matrix.lang == 'react-native') && inputs.approve-run == ''
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up .NET
        if: matrix.lang == 'csharp' && inputs.approve-run == ''
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # JDK setup skipped for Kotlin — build check deferred to cli-ci.yml

      # ── Download planner guidance (if available) ────────────────────
      - name: Download plan artifact
        if: inputs.approve-run == '' && needs.plan.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: sync-plan
          path: .plan
        continue-on-error: true

      - name: Extract planner guidance
        if: inputs.approve-run == ''
        id: guidance
        env:
          LANG: ${{ matrix.lang }}
        run: |
          GUIDANCE=""
          if [ -f .plan/sync-plan.json ]; then
            GUIDANCE=$(jq -r --arg lang "$LANG" '.per_language[$lang].guidance // ""' .plan/sync-plan.json 2>/dev/null || echo "")
          fi
          if [ -n "$GUIDANCE" ] && [ "$GUIDANCE" != "null" ]; then
            {
              echo "content<<EOGUIDANCE"
              echo ""
              echo "### Planner guidance"
              echo "The planning phase analyzed the Rust CLI changes and identified these specific items for this language:"
              echo "$GUIDANCE"
              echo ""
              echo "EOGUIDANCE"
            } >> "$GITHUB_OUTPUT"
          else
            echo "content=" >> "$GITHUB_OUTPUT"
          fi

      # ── Generate prompt and run Claude ───────────────────────────────
      - name: Generate sync prompt
        if: inputs.approve-run == ''
        id: gen-prompt
        env:
          LANG: ${{ matrix.lang }}
          DIFF_SUMMARY: ${{ steps.diff-info.outputs.diff_summary }}
          DIFF_BASE: ${{ steps.diff-info.outputs.diff_base }}
          PLANNER_GUIDANCE: ${{ steps.guidance.outputs.content }}
        run: |
          python3 << 'PYEOF'
          import os, sys
          sys.path.insert(0, "crates/breez-sdk/bindings/examples/cli/sync-prompts")
          from generate import generate_prompt

          prompt = generate_prompt(os.environ["LANG"])

          # Resolve GitHub Actions expressions that would normally be
          # evaluated in YAML but aren't when the prompt is assembled dynamically
          replacements = {
              "${{ steps.diff-info.outputs.diff_summary }}": os.environ.get("DIFF_SUMMARY", ""),
              "${{ steps.diff-info.outputs.diff_base }}": os.environ.get("DIFF_BASE", ""),
          }
          for expr, value in replacements.items():
              prompt = prompt.replace(expr, value)

          # Inject planner guidance
          guidance = os.environ.get("PLANNER_GUIDANCE", "")
          prompt = prompt.replace("{{PLANNER_GUIDANCE}}", guidance)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("content<<EOPROMPT_DELIM_7f3a\n")
              f.write(prompt)
              f.write("\nEOPROMPT_DELIM_7f3a\n")
          PYEOF

      - name: Sync ${{ steps.config.outputs.lang_name }} CLI
        if: inputs.approve-run == ''
        id: sync-claude
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --model claude-opus-4-6
            --allowed-tools
            ${{ steps.config.outputs.allowed_tools }}
          prompt: ${{ steps.gen-prompt.outputs.content }}

      # ── Retry on failure or empty output ───────────────────────────
      - name: Check for changes after sync
        if: inputs.approve-run == '' && steps.sync-claude.outcome == 'success'
        id: change-check
        env:
          TARGET_DIR: ${{ steps.config.outputs.target_dir }}
        run: |
          git add -N "$TARGET_DIR"
          if git diff --quiet HEAD -- "$TARGET_DIR"; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract failure context
        if: inputs.approve-run == '' && (steps.sync-claude.outcome == 'failure' || steps.change-check.outputs.empty == 'true')
        id: failure-ctx
        run: |
          LOG="${{ runner.temp }}/claude-execution-output.json"
          if [ -f "$LOG" ]; then
            CONTEXT=$(python3 -c "
          import json
          try:
              data = json.load(open('$LOG'))
              msgs = data.get('messages', [])[-5:]
              for m in msgs:
                  c = m.get('content', '')
                  print(c[:500] if isinstance(c, str) else str(c)[:500])
          except Exception:
              print('Could not parse execution log')
          " 2>/dev/null || echo "Could not parse log")
          else
            CONTEXT="Claude session ended without producing output log."
          fi
          {
            echo "context<<EOCTX_DELIM_4a1c"
            echo "$CONTEXT"
            echo "EOCTX_DELIM_4a1c"
          } >> "$GITHUB_OUTPUT"

      - name: Retry sync (attempt 2)
        if: inputs.approve-run == '' && steps.failure-ctx.outputs.context != ''
        id: sync-retry
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'github-actions[bot]'
          claude_args: >-
            --model claude-opus-4-6
            --allowed-tools
            ${{ steps.config.outputs.allowed_tools }}
          prompt: |
            RETRY ATTEMPT — the previous sync session ended prematurely or produced no changes.

            Previous session context (last messages before failure):
            ---
            ${{ steps.failure-ctx.outputs.context }}
            ---

            ${{ steps.gen-prompt.outputs.content }}

            Important: The previous attempt may have left partial changes in the
            working tree. Check the current state of files before making edits.

      - name: Fail if both attempts failed
        if: inputs.approve-run == '' && steps.sync-claude.outcome == 'failure' && (steps.sync-retry.outcome == 'failure' || steps.sync-retry.outcome == 'skipped')
        run: |
          echo "::error::Both sync attempts failed for ${{ matrix.lang }}"
          exit 1

      # ── Create patch artifact (always, not just dry-run) ────────────
      - name: Create patch
        if: inputs.approve-run == ''
        env:
          TARGET_DIR: ${{ steps.config.outputs.target_dir }}
          LANG: ${{ matrix.lang }}
        run: |
          git add -N "$TARGET_DIR"
          git diff HEAD -- "$TARGET_DIR" > "sync-${LANG}.patch"

      - name: Upload patch artifacts
        if: inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-${{ matrix.lang }}-patch
          path: |
            sync-${{ matrix.lang }}.patch
            sync-findings.md
          retention-days: 7

      - name: Upload Claude log
        if: always() && inputs.approve-run == ''
        uses: actions/upload-artifact@v4
        with:
          name: sync-${{ matrix.lang }}-claude-log
          path: ${{ runner.temp }}/claude-execution-output.json
          retention-days: 30
          if-no-files-found: ignore

      # ── Summary ─────────────────────────────────────────────────────
      - name: Summary
        if: always() && inputs.approve-run == ''
        env:
          LANG: ${{ matrix.lang }}
          LANG_NAME: ${{ steps.config.outputs.lang_name }}
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "### Dry run — ${LANG_NAME} CLI sync" >> "$GITHUB_STEP_SUMMARY"
            if [ -f sync-findings.md ]; then
              echo "#### Findings" >> "$GITHUB_STEP_SUMMARY"
              cat sync-findings.md >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
            if [ -s "sync-${LANG}.patch" ]; then
              echo "#### Patch" >> "$GITHUB_STEP_SUMMARY"
              echo '```diff' >> "$GITHUB_STEP_SUMMARY"
              cat "sync-${LANG}.patch" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "To approve, re-run with \`approve-run\` = \`${{ github.run_id }}\`." >> "$GITHUB_STEP_SUMMARY"
            elif [ -f sync-findings.md ]; then
              echo "::warning::Changes were made but cancelled before patch capture." >> "$GITHUB_STEP_SUMMARY"
            else
              echo "No ${LANG_NAME} CLI changes were needed." >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "::notice::Dry run completed — no PR created. See job summary for diff."
          else
            echo "::notice::Claude Code sync completed for ${LANG_NAME}"
          fi

  # ── Consolidate all patches into a single PR ───────────────────────
  create-pr:
    name: Create PR
    needs: [setup, build-sync-matrix, sync]
    if: ${{ !inputs.dry-run && !cancelled() && needs.build-sync-matrix.outputs.has_languages == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_CLI_PR_TOKEN || github.token }}
          fetch-depth: 0  # Full history needed to preserve existing PR branch changes

      # ── Resolve PR reviewer ──────────────────────────────────────────
      - name: Resolve reviewer
        id: reviewer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEWER=$(gh api "repos/${{ github.repository }}/commits?path=crates/breez-sdk/cli/src/&per_page=1" \
            --jq '.[0].author.login // empty') || true
          if [ -n "$REVIEWER" ] && [[ ! "$REVIEWER" =~ \[bot\]$ ]]; then
            echo "reviewer=$REVIEWER" >> "$GITHUB_OUTPUT"
            echo "::notice::Will request review from $REVIEWER (last Rust CLI committer)"
          else
            echo "reviewer=" >> "$GITHUB_OUTPUT"
            echo "::notice::No reviewer to assign (last committer is a bot or unknown)"
          fi

      # ── Determine which languages were requested ────────────────────
      - name: Determine languages
        id: langs
        env:
          REQUESTED: ${{ inputs.languages }}
        run: |
          ALL='["csharp","flutter","golang","kotlin-multiplatform","python","react-native","swift","wasm"]'
          if [ -z "$REQUESTED" ]; then
            echo "list=$ALL" >> "$GITHUB_OUTPUT"
          else
            echo "list=$REQUESTED" >> "$GITHUB_OUTPUT"
          fi

      # ── Download patches ────────────────────────────────────────────
      - name: Download all patch artifacts
        id: download
        env:
          LANGS: ${{ steps.langs.outputs.list }}
          APPROVE_RUN: ${{ inputs.approve-run }}
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p patches
          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            ARTIFACT_NAME="sync-${LANG}-patch"
            RUN_ID="${APPROVE_RUN:-${{ github.run_id }}}"
            echo "Downloading artifact ${ARTIFACT_NAME} from run ${RUN_ID}..."
            if gh run download "$RUN_ID" --name "$ARTIFACT_NAME" --dir "patches/${LANG}" 2>/dev/null; then
              echo "::notice::Downloaded patch for ${LANG}"
            else
              echo "::warning::No patch artifact found for ${LANG} (sync job may have failed or been skipped)"
              mkdir -p "patches/${LANG}"
              touch "patches/${LANG}/sync-${LANG}.patch"
            fi
          done

      # ── Apply patches and track results ─────────────────────────────
      - name: Apply patches
        id: apply
        env:
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          UPDATED=""
          NO_CHANGES=""
          FAILED=""

          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            PATCH="patches/${LANG}/sync-${LANG}.patch"
            if [ ! -f "$PATCH" ] || [ ! -s "$PATCH" ]; then
              echo "::notice::${LANG}: no changes"
              NO_CHANGES="${NO_CHANGES}${LANG},"
              continue
            fi
            if git apply "$PATCH" 2>/dev/null; then
              echo "::notice::${LANG}: patch applied successfully"
              UPDATED="${UPDATED}${LANG},"
            else
              echo "::warning::${LANG}: patch failed to apply — target files may have changed"
              FAILED="${FAILED}${LANG},"
            fi
          done

          # Trim trailing commas
          UPDATED="${UPDATED%,}"
          NO_CHANGES="${NO_CHANGES%,}"
          FAILED="${FAILED%,}"

          echo "updated=$UPDATED" >> "$GITHUB_OUTPUT"
          echo "no_changes=$NO_CHANGES" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"

          if [ -z "$UPDATED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No language patches to apply — skipping PR creation."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # ── Preserve existing PR changes & apply new patches ───────────
      - name: Create branch and PR
        if: steps.apply.outputs.has_changes == 'true'
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_CLI_PR_TOKEN }}
          UPDATED: ${{ steps.apply.outputs.updated }}
          NO_CHANGES: ${{ steps.apply.outputs.no_changes }}
          FAILED: ${{ steps.apply.outputs.failed }}
          REVIEWER: ${{ steps.reviewer.outputs.reviewer }}
          APPROVE_RUN: ${{ inputs.approve-run }}
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          # Set up git identity
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="claude/sync-cli"
          PRESERVED=""
          PRESERVE_FAILED=""

          # ── Check for existing PR branch ──────────────────────────
          EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "::notice::Found existing PR #${EXISTING_PR} — preserving non-overlapping changes"
            git fetch origin "$BRANCH" 2>/dev/null || true

            # Find which languages have changes on the existing branch
            EXISTING_CHANGED=$(git diff --name-only origin/main...origin/"$BRANCH" 2>/dev/null | \
              grep -oP 'langs/\K[^/]+' | sort -u || true)

            # Start fresh from main
            git checkout -B "$BRANCH" origin/main

            # Preserve changes for languages NOT re-synced in this run
            for EXISTING_LANG in $EXISTING_CHANGED; do
              # Skip if this language was updated in the current run
              if echo ",$UPDATED," | grep -q ",${EXISTING_LANG},"; then
                echo "::notice::${EXISTING_LANG}: re-synced — replacing previous changes"
                continue
              fi

              # Try to preserve the old changes
              OLD_DIFF=$(git diff origin/main...origin/"$BRANCH" -- "*/langs/${EXISTING_LANG}/*" 2>/dev/null || true)
              if [ -n "$OLD_DIFF" ]; then
                if echo "$OLD_DIFF" | git apply 2>/dev/null; then
                  TARGET_DIR=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${EXISTING_LANG}').get('target_dir', ''))
          " 2>/dev/null || echo "")
                  if [ -n "$TARGET_DIR" ]; then
                    git add "$TARGET_DIR"
                    git commit -m "chore: preserve ${EXISTING_LANG} CLI sync from previous run"
                    PRESERVED="${PRESERVED}${EXISTING_LANG},"
                    echo "::notice::${EXISTING_LANG}: preserved from previous PR"
                  fi
                else
                  PRESERVE_FAILED="${PRESERVE_FAILED}${EXISTING_LANG},"
                  echo "::warning::${EXISTING_LANG}: could not preserve previous changes (main has diverged)"
                fi
              fi
            done
          else
            git checkout -B "$BRANCH"
          fi

          PRESERVED="${PRESERVED%,}"
          PRESERVE_FAILED="${PRESERVE_FAILED%,}"

          # ── Apply new patches as per-language commits ─────────────
          IFS=',' read -ra UPDATED_LANGS <<< "$UPDATED"
          for LANG in "${UPDATED_LANGS[@]}"; do
            TARGET_DIR=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${LANG}').get('target_dir', ''))
          ")
            if [ -n "$TARGET_DIR" ]; then
              git add "$TARGET_DIR"
              git commit -m "chore: sync ${LANG} CLI with Rust CLI changes (${{ github.sha }})"
            fi
          done

          # ── Build PR body ──────────────────────────────────────────
          BODY="Automated sync of language CLIs from Rust CLI changes."
          BODY+=$'\n\n'"**Source commit:** [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
          BODY+=$'\n'"**Workflow run:** [View logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          if [ -n "$APPROVE_RUN" ]; then
            BODY+=$'\n'"**Approved from:** [dry-run #${APPROVE_RUN}](https://github.com/${{ github.repository }}/actions/runs/${APPROVE_RUN})"
          fi

          # Language status list (includes all 8 languages)
          ALL_LANGS='["csharp","flutter","golang","kotlin-multiplatform","python","react-native","swift","wasm"]'
          BODY+=$'\n\n'"**Language status:**"
          for LANG in $(echo "$ALL_LANGS" | jq -r '.[]'); do
            LANG_NAME=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${LANG}').get('lang_name', '${LANG}'))
          ")
            if echo ",$UPDATED," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :white_check_mark: ${LANG_NAME} (synced in run #${{ github.run_id }})"
            elif echo ",$PRESERVED," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :recycle: ${LANG_NAME} (preserved from previous run)"
            elif echo ",$FAILED," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :x: ${LANG_NAME} (patch failed to apply)"
            elif echo ",$PRESERVE_FAILED," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :warning: ${LANG_NAME} (previous changes could not be preserved — needs re-sync)"
            elif echo ",$NO_CHANGES," | grep -q ",${LANG},"; then
              BODY+=$'\n'"- :next_track_button: ${LANG_NAME} (no changes needed)"
            else
              BODY+=$'\n'"- :grey_question: ${LANG_NAME} (not synced in this run)"
            fi
          done

          # Aggregate sync findings from all languages
          HAS_FINDINGS=false
          FINDINGS=""
          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            FINDINGS_FILE="patches/${LANG}/sync-findings.md"
            if [ -f "$FINDINGS_FILE" ] && [ -s "$FINDINGS_FILE" ]; then
              LANG_NAME=$(python3 -c "
          import sys
          sys.path.insert(0, 'crates/breez-sdk/bindings/examples/cli/sync-prompts')
          from generate import load_lang_config
          print(load_lang_config('${LANG}').get('lang_name', '${LANG}'))
          ")
              FINDINGS+=$'\n'"### ${LANG_NAME}"$'\n'
              FINDINGS+="$(cat "$FINDINGS_FILE")"$'\n'
              HAS_FINDINGS=true
            fi
          done

          if [ "$HAS_FINDINGS" = true ]; then
            BODY+=$'\n\n'"<details>"
            BODY+=$'\n'"<summary>Sync findings</summary>"
            BODY+=$'\n'"${FINDINGS}"
            BODY+=$'\n'"</details>"
          fi

          # Warn about failures
          ALL_FAILED="${FAILED}"
          if [ -n "$PRESERVE_FAILED" ]; then
            if [ -n "$ALL_FAILED" ]; then
              ALL_FAILED="${ALL_FAILED},${PRESERVE_FAILED}"
            else
              ALL_FAILED="$PRESERVE_FAILED"
            fi
          fi
          if [ -n "$ALL_FAILED" ]; then
            BODY+=$'\n\n'"> [!WARNING]"
            BODY+=$'\n'"> Some languages need attention:"
            if [ -n "$FAILED" ]; then
              BODY+=$'\n'"> - Patches failed to apply: ${FAILED}"
            fi
            if [ -n "$PRESERVE_FAILED" ]; then
              BODY+=$'\n'"> - Previous changes could not be preserved (main diverged): ${PRESERVE_FAILED}"
            fi
            BODY+=$'\n'"> Consider re-running the sync for these languages."
          fi

          REVIEWER_FLAG=""
          if [ -n "$REVIEWER" ]; then
            REVIEWER_FLAG="--reviewer $REVIEWER"
          fi

          # Push and create/update PR
          if [ -n "$EXISTING_PR" ]; then
            git push --force-with-lease -u origin HEAD
            gh pr edit "$EXISTING_PR" --body "$BODY"
            echo "::notice::Updated existing PR #${EXISTING_PR}"
            echo "action=updated" >> "$GITHUB_OUTPUT"
          else
            git push -u origin HEAD
            gh pr create --title "chore: sync CLI languages with Rust CLI changes" \
              --body "$BODY" \
              --label "CLI" \
              $REVIEWER_FLAG \
              --base main
            echo "action=created" >> "$GITHUB_OUTPUT"
          fi

      - name: Cleanup branch on failure
        if: failure() && steps.create-pr.outputs.action == 'created'
        env:
          GH_TOKEN: ${{ secrets.SYNC_CLI_PR_TOKEN }}
        run: |
          git push origin --delete "claude/sync-cli" 2>/dev/null || true

      # ── Auto re-trigger for failed patches ─────────────────────────
      - name: Re-trigger for failed languages
        if: steps.apply.outputs.failed != ''
        env:
          GH_TOKEN: ${{ secrets.SYNC_CLI_PR_TOKEN }}
          FAILED: ${{ steps.apply.outputs.failed }}
        run: |
          FAILED_JSON=$(echo "$FAILED" | tr ',' '\n' | jq -R . | jq -s -c .)
          echo "::notice::Triggering re-sync for failed languages: $FAILED"
          gh workflow run sync-cli.yml \
            --field languages="$FAILED_JSON" \
            --field skip-planning=true

      # ── Job summary ─────────────────────────────────────────────────
      - name: Summary
        if: always()
        env:
          UPDATED: ${{ steps.apply.outputs.updated }}
          NO_CHANGES: ${{ steps.apply.outputs.no_changes }}
          FAILED: ${{ steps.apply.outputs.failed }}
          LANGS: ${{ steps.langs.outputs.list }}
        run: |
          echo "## CLI Sync Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Language | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|--------|" >> "$GITHUB_STEP_SUMMARY"

          for LANG in $(echo "$LANGS" | jq -r '.[]'); do
            if echo ",$UPDATED," | grep -q ",${LANG},"; then
              STATUS="Updated"
            elif echo ",$FAILED," | grep -q ",${LANG},"; then
              STATUS="Failed"
            elif echo ",$NO_CHANGES," | grep -q ",${LANG},"; then
              STATUS="No changes"
            else
              STATUS="No patch"
            fi
            echo "| ${LANG} | ${STATUS} |" >> "$GITHUB_STEP_SUMMARY"
          done

          if [ -n "${{ inputs.approve-run }}" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Approved from dry-run [${{ inputs.approve-run }}](https://github.com/${{ github.repository }}/actions/runs/${{ inputs.approve-run }})" >> "$GITHUB_STEP_SUMMARY"
          fi
