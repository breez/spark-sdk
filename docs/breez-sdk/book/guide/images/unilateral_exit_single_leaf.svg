<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 532" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13">
  <title>Single-leaf unilateral exit: packages and the CPFP chain</title>
  <desc>A vertical sequence of four packages (root, intermediate, leaf, refund), each a pre-signed transaction paired with a CPFP child, ending in a sweep. The pre-signed transactions form one chain; the CPFP children form a second chain, each spending the previous child's change, starting from your funding UTXO. Broadcast one package, wait for it to confirm, then the next.</desc>
  <style>
    text { font-size: 13px; }
    .bg { fill: none; }
    .lbl { fill: #6B7280; } .mut { fill: #9CA3AF; }
    .numc { fill: #374151; } .num { fill: #FFFFFF; font-weight: 600; }
    .ahf { fill: #6B7280; }
    .con { stroke: #6B7280; } .dcon { stroke: #9CA3AF; }
    .pkg { fill: none; stroke: #9CA3AF; }
    .pre { fill: #EEF2FF; stroke: #A5B4FC; } .pre-t { fill: #3730A3; font-weight: 600; } .pre-s { fill: #6366F1; }
    .cpfp { fill: #F3F4F6; stroke: #D1D5DB; } .cpfp-t { fill: #374151; font-weight: 600; } .cpfp-s { fill: #6B7280; }
    .ref { fill: #FEF3C7; stroke: #FCD34D; } .ref-t { fill: #92400E; font-weight: 600; } .ref-s { fill: #B45309; }
    .swp { fill: #ECFDF5; stroke: #6EE7B7; } .swp-t { fill: #065F46; font-weight: 600; } .swp-s { fill: #059669; }
    .fund { fill: #F9FAFB; stroke: #9CA3AF; } .fund-t { fill: #374151; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1c1c1f; }
      .lbl { fill: #A1A1AA; } .mut { fill: #8B8B94; }
      .numc { fill: #E5E7EB; } .num { fill: #111827; }
      .ahf { fill: #A1A1AA; } .con { stroke: #A1A1AA; } .dcon { stroke: #8B8B94; }
      .pkg { stroke: #71717A; }
      .pre { fill: #312E81; stroke: #818CF8; } .pre-t { fill: #E0E7FF; } .pre-s { fill: #C7D2FE; }
      .cpfp { fill: #3F3F46; stroke: #71717A; } .cpfp-t { fill: #F4F4F5; } .cpfp-s { fill: #D4D4D8; }
      .ref { fill: #78350F; stroke: #FBBF24; } .ref-t { fill: #FEF3C7; } .ref-s { fill: #FDE68A; }
      .swp { fill: #064E3B; stroke: #34D399; } .swp-t { fill: #D1FAE5; } .swp-s { fill: #6EE7B7; }
      .fund { fill: #27272A; stroke: #71717A; } .fund-t { fill: #E4E4E7; }
    }
  </style>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path class="ahf" d="M0.5,0.5 L8,3.5 L0.5,6.5 Z"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="720" height="532" rx="12"/>

  <!-- column headers -->
  <text class="lbl" x="223" y="70" text-anchor="middle">Pre-signed transactions (fixed)</text>

  <!-- funding (yours) feeds the first CPFP child -->
  <rect class="fund" x="398" y="40" width="196" height="34" rx="10" stroke-dasharray="5 4"/>
  <text class="fund-t" x="496" y="62" text-anchor="middle" font-size="12">Funding UTXO (native SegWit)</text>

  <!-- order spine -->
  <g class="numc"><circle cx="30" cy="116" r="13"/><circle cx="30" cy="200" r="13"/><circle cx="30" cy="284" r="13"/><circle cx="30" cy="368" r="13"/><circle cx="30" cy="452" r="13"/></g>
  <g class="num" text-anchor="middle"><text x="30" y="121">1</text><text x="30" y="205">2</text><text x="30" y="289">3</text><text x="30" y="373">4</text><text x="30" y="457">5</text></g>
  <g class="con" stroke-width="1.6" fill="none">
    <line x1="30" y1="131" x2="30" y2="185" marker-end="url(#ah)"/>
    <line x1="30" y1="215" x2="30" y2="269" marker-end="url(#ah)"/>
    <line x1="30" y1="299" x2="30" y2="353" marker-end="url(#ah)"/>
    <line x1="30" y1="383" x2="30" y2="437" marker-end="url(#ah)"/>
  </g>

  <!-- packages (dashed outline = the broadcast unit) -->
  <g class="pkg" stroke-width="1.3" stroke-dasharray="4 3">
    <rect x="104" y="84" width="506" height="64" rx="12"/>
    <rect x="104" y="168" width="506" height="64" rx="12"/>
    <rect x="104" y="252" width="506" height="64" rx="12"/>
    <rect x="104" y="336" width="506" height="64" rx="12"/>
  </g>

  <!-- pre-signed chain (left column, parent spends into child) -->
  <g class="con" stroke-width="1.6" fill="none">
    <line x1="160" y1="140" x2="160" y2="176" marker-end="url(#ah)"/>
    <line x1="160" y1="224" x2="160" y2="260" marker-end="url(#ah)"/>
    <line x1="160" y1="308" x2="160" y2="344" marker-end="url(#ah)"/>
    <line x1="200" y1="400" x2="200" y2="428" marker-end="url(#ah)"/>
  </g>

  <!-- CPFP chain (right column, each child spends the previous child's change) -->
  <g class="con" stroke-width="1.6" fill="none">
    <line x1="496" y1="74" x2="496" y2="92" marker-end="url(#ah)"/>
    <line x1="496" y1="140" x2="496" y2="176" marker-end="url(#ah)"/>
    <line x1="496" y1="224" x2="496" y2="260" marker-end="url(#ah)"/>
    <line x1="496" y1="308" x2="496" y2="344" marker-end="url(#ah)"/>
    <line x1="496" y1="392" x2="496" y2="428" marker-end="url(#ah)"/>
  </g>
  <text class="mut" x="612" y="238" text-anchor="middle" font-size="11" transform="rotate(90 612 238)">CPFP chain</text>

  <!-- + separators -->
  <g class="lbl" text-anchor="middle" font-weight="600"><text x="364" y="121">+</text><text x="364" y="205">+</text><text x="364" y="289">+</text><text x="364" y="373">+</text></g>

  <!-- row 1: root -->
  <rect class="pre" x="120" y="92" width="206" height="48" rx="9"/>
  <text class="pre-t" x="223" y="113" text-anchor="middle">Root node tx</text>
  <text class="pre-s" x="223" y="130" text-anchor="middle" font-size="11">zero fee</text>
  <rect class="cpfp" x="402" y="92" width="192" height="48" rx="9"/>
  <text class="cpfp-t" x="498" y="113" text-anchor="middle">CPFP child</text>
  <text class="cpfp-s" x="498" y="130" text-anchor="middle" font-size="11">pays the fee</text>

  <!-- row 2: intermediate -->
  <rect class="pre" x="120" y="176" width="206" height="48" rx="9"/>
  <text class="pre-t" x="223" y="197" text-anchor="middle">Intermediate node tx</text>
  <text class="pre-s" x="223" y="214" text-anchor="middle" font-size="11">one per tree level</text>
  <rect class="cpfp" x="402" y="176" width="192" height="48" rx="9"/>
  <text class="cpfp-t" x="498" y="197" text-anchor="middle">CPFP child</text>
  <text class="cpfp-s" x="498" y="214" text-anchor="middle" font-size="11">pays the fee</text>

  <!-- row 3: leaf -->
  <rect class="pre" x="120" y="260" width="206" height="48" rx="9"/>
  <text class="pre-t" x="223" y="281" text-anchor="middle">Leaf node tx</text>
  <text class="pre-s" x="223" y="298" text-anchor="middle" font-size="11">last pre-signed node</text>
  <rect class="cpfp" x="402" y="260" width="192" height="48" rx="9"/>
  <text class="cpfp-t" x="498" y="281" text-anchor="middle">CPFP child</text>
  <text class="cpfp-s" x="498" y="298" text-anchor="middle" font-size="11">pays the fee</text>

  <!-- row 4: refund -->
  <rect class="ref" x="120" y="344" width="206" height="48" rx="9"/>
  <text class="ref-t" x="223" y="365" text-anchor="middle">Refund tx</text>
  <text class="ref-s" x="223" y="382" text-anchor="middle" font-size="11">timelock must mature first</text>
  <rect class="cpfp" x="402" y="344" width="192" height="48" rx="9"/>
  <text class="cpfp-t" x="498" y="365" text-anchor="middle">CPFP child</text>
  <text class="cpfp-s" x="498" y="382" text-anchor="middle" font-size="11">pays the fee</text>

  <!-- row 5: sweep (yours) -->
  <rect class="swp" x="120" y="428" width="474" height="48" rx="9"/>
  <text class="swp-t" x="357" y="449" text-anchor="middle">Sweep tx to your address</text>
  <text class="swp-s" x="357" y="466" text-anchor="middle" font-size="11">spends the refund output and the final CPFP change</text>

  <!-- legend -->
  <g font-size="11">
    <rect class="pre" x="60" y="498" width="12" height="12" rx="3"/><text class="lbl" x="78" y="508">pre-signed node</text>
    <rect class="cpfp" x="192" y="498" width="12" height="12" rx="3"/><text class="lbl" x="210" y="508">CPFP child (chained)</text>
    <rect class="ref" x="342" y="498" width="12" height="12" rx="3"/><text class="lbl" x="360" y="508">timelocked refund</text>
    <rect class="swp" x="474" y="498" width="12" height="12" rx="3"/><text class="lbl" x="492" y="508">sweep</text>
    <rect class="pkg" x="60" y="516" width="12" height="12" rx="3" stroke-dasharray="4 3"/><text class="lbl" x="78" y="526">dashed box = one package: broadcast the pair together</text>
  </g>
</svg>
