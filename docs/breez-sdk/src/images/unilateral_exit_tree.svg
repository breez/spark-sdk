<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#3b82f6" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f59e0b" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#10b981" stroke-width="1.2"/>
    </marker>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="620" rx="12" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" font-size="16" font-weight="600" fill="#1e293b">Unilateral Exit — Transaction Tree</text>

  <!-- Legend -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
    <text x="18" y="11" font-size="11" fill="#475569">Node / Leaf TX (pre-signed)</text>
    <rect x="195" y="0" width="12" height="12" rx="2" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
    <text x="213" y="11" font-size="11" fill="#475569">Refund TX (timelocked, pre-signed)</text>
    <rect x="440" y="0" width="12" height="12" rx="2" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
    <text x="458" y="11" font-size="11" fill="#475569">Sweep TX (signed by SDK)</text>
  </g>
  <g transform="translate(20, 68)">
    <rect x="0" y="0" width="12" height="12" rx="2" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="18" y="11" font-size="11" fill="#475569">CPFP fee-bump (you sign with external UTXO)</text>
    <rect x="310" y="0" width="12" height="12" rx="2" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
    <text x="328" y="11" font-size="11" fill="#475569">Your external UTXO</text>
  </g>

  <!-- ===== MAIN CHAIN ===== -->

  <!-- On-chain commitment (root) -->
  <rect x="20" y="100" width="160" height="36" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="100" y="123" text-anchor="middle" font-size="12" fill="#475569">On-chain Commitment</text>

  <!-- Arrow down -->
  <line x1="100" y1="136" x2="100" y2="158" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Root Node TX -->
  <rect x="20" y="160" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="100" y="183" text-anchor="middle" font-size="12" font-weight="500" fill="#1e40af">Root Node TX</text>

  <!-- CPFP for Root -->
  <rect x="220" y="160" width="130" height="36" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="178" text-anchor="middle" font-size="11" fill="#64748b">CPFP fee-bump</text>
  <text x="285" y="191" text-anchor="middle" font-size="10" fill="#94a3b8">(anchor + your UTXO)</text>
  <line x1="180" y1="178" x2="218" y2="178" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow down -->
  <line x1="100" y1="196" x2="100" y2="218" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Intermediate Node TX -->
  <rect x="20" y="220" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="100" y="243" text-anchor="middle" font-size="12" font-weight="500" fill="#1e40af">Node TX</text>

  <!-- CPFP for Intermediate -->
  <rect x="220" y="220" width="130" height="36" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="238" text-anchor="middle" font-size="11" fill="#64748b">CPFP fee-bump</text>
  <text x="285" y="251" text-anchor="middle" font-size="10" fill="#94a3b8">(chained change)</text>
  <line x1="180" y1="238" x2="218" y2="238" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Dots -->
  <text x="100" y="275" text-anchor="middle" font-size="16" fill="#94a3b8">⋮</text>

  <!-- Arrow down -->
  <line x1="100" y1="282" x2="100" y2="298" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Node TX (last before leaf) -->
  <rect x="20" y="300" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="100" y="323" text-anchor="middle" font-size="12" font-weight="500" fill="#1e40af">Node TX</text>

  <!-- CPFP -->
  <rect x="220" y="300" width="130" height="36" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="318" text-anchor="middle" font-size="11" fill="#64748b">CPFP fee-bump</text>
  <text x="285" y="331" text-anchor="middle" font-size="10" fill="#94a3b8">(chained change)</text>
  <line x1="180" y1="318" x2="218" y2="318" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow down with timelock label -->
  <line x1="100" y1="336" x2="100" y2="368" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <rect x="115" y="340" width="110" height="20" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="0.8"/>
  <text x="170" y="354" text-anchor="middle" font-size="10" font-weight="500" fill="#2563eb">⏱ CSV timelock</text>

  <!-- Leaf TX -->
  <rect x="20" y="370" width="160" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="100" y="393" text-anchor="middle" font-size="12" font-weight="500" fill="#1e40af">Leaf TX</text>

  <!-- CPFP for Leaf -->
  <rect x="220" y="370" width="130" height="36" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="388" text-anchor="middle" font-size="11" fill="#64748b">CPFP fee-bump</text>
  <text x="285" y="401" text-anchor="middle" font-size="10" fill="#94a3b8">(chained change)</text>
  <line x1="180" y1="388" x2="218" y2="388" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow down with timelock -->
  <line x1="100" y1="406" x2="100" y2="438" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#arrow-amber)"/>
  <rect x="115" y="410" width="110" height="20" rx="4" fill="#fffbeb" stroke="#fcd34d" stroke-width="0.8"/>
  <text x="170" y="424" text-anchor="middle" font-size="10" font-weight="500" fill="#d97706">⏱ CSV timelock</text>

  <!-- Refund TX -->
  <rect x="20" y="440" width="160" height="36" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="100" y="463" text-anchor="middle" font-size="12" font-weight="500" fill="#92400e">Refund TX</text>

  <!-- CPFP for Refund -->
  <rect x="220" y="440" width="130" height="36" rx="6" fill="#fff" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="285" y="458" text-anchor="middle" font-size="11" fill="#64748b">CPFP fee-bump</text>
  <text x="285" y="471" text-anchor="middle" font-size="10" fill="#94a3b8">(chained change)</text>
  <line x1="180" y1="458" x2="218" y2="458" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow down to sweep -->
  <line x1="100" y1="476" x2="100" y2="508" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Sweep TX -->
  <rect x="20" y="510" width="160" height="36" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.2"/>
  <text x="100" y="533" text-anchor="middle" font-size="12" font-weight="500" fill="#065f46">Sweep TX</text>

  <!-- Arrow to destination -->
  <line x1="100" y1="546" x2="100" y2="568" stroke="#10b981" stroke-width="1.2" marker-end="url(#arrow-green)"/>

  <!-- Destination -->
  <rect x="20" y="570" width="160" height="36" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="100" y="593" text-anchor="middle" font-size="12" font-weight="500" fill="#166534">Your Destination Address</text>

  <!-- ===== EXTERNAL UTXO ===== -->

  <!-- External UTXO box -->
  <rect x="540" y="130" width="160" height="36" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="620" y="153" text-anchor="middle" font-size="12" font-weight="500" fill="#991b1b">Your External UTXO</text>

  <!-- Chain of arrows from UTXO through CPFPs -->
  <line x1="620" y1="166" x2="620" y2="178" stroke="#ef4444" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="620" y1="178" x2="352" y2="178" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Label: change chains through -->
  <rect x="420" y="210" width="160" height="44" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="228" text-anchor="middle" font-size="11" fill="#64748b">Change output chains</text>
  <text x="500" y="243" text-anchor="middle" font-size="11" fill="#64748b">through each CPFP TX</text>
  <line x1="420" y1="232" x2="352" y2="238" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="420" y1="232" x2="352" y2="318" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="420" y1="232" x2="352" y2="388" stroke="#cbd5e1" stroke-width="0.8"/>
  <line x1="420" y1="232" x2="352" y2="458" stroke="#cbd5e1" stroke-width="0.8"/>

  <!-- Broadcast order annotation -->
  <g transform="translate(400, 310)">
    <rect x="0" y="0" width="300" height="78" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
    <text x="150" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Broadcast Order (1p1c)</text>
    <text x="16" y="38" font-size="11" fill="#64748b">1. Submit package → wait for confirmation</text>
    <text x="16" y="53" font-size="11" fill="#64748b">2. Next package → wait for confirmation</text>
    <text x="16" y="68" font-size="11" fill="#64748b">3. Repeat... (wait for timelocks if needed)</text>
  </g>
</svg>
